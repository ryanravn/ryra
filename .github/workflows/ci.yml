name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace


  build-linux:
    needs: check
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            deb_arch: amd64
            rpm_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            deb_arch: arm64
            rpm_arch: aarch64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
          sudo apt-get update && sudo apt-get install -y libarchive-tools zstd

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p ryra

      - name: Package tarball
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cd target/${{ matrix.target }}/release
          tar czf "ryra-${VERSION}-${{ matrix.target }}.tar.gz" ryra
          mv "ryra-${VERSION}-${{ matrix.target }}.tar.gz" "$GITHUB_WORKSPACE/"
          # install.sh fetches a stable versionless filename from the
          # `latest` release so it doesn't need to discover the version
          # out-of-band. Produce that alongside the versioned tarball.
          cp "$GITHUB_WORKSPACE/ryra-${VERSION}-${{ matrix.target }}.tar.gz" \
             "$GITHUB_WORKSPACE/ryra-${{ matrix.target }}.tar.gz"

      - name: Sign tarballs
        env:
          APT_GPG_PRIVATE: ${{ secrets.APT_GPG_PRIVATE }}
        run: |
          echo "$APT_GPG_PRIVATE" | gpg --batch --import
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          gpg --batch --yes --detach-sign --armor \
            --output "ryra-${VERSION}-${{ matrix.target }}.tar.gz.asc" \
            "ryra-${VERSION}-${{ matrix.target }}.tar.gz"
          # Versionless copy is byte-identical, so one signature covers both.
          cp "ryra-${VERSION}-${{ matrix.target }}.tar.gz.asc" \
             "ryra-${{ matrix.target }}.tar.gz.asc"

      - name: Build deb
        run: |
          cargo deb -p ryra --no-build --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb ./ryra_${{ matrix.deb_arch }}.deb

      - name: Build rpm
        run: |
          cargo generate-rpm -p crates/ryra --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/generate-rpm/*.rpm ./ryra.${{ matrix.rpm_arch }}.rpm

      - name: Build pacman package
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          ARCH="${{ matrix.rpm_arch }}"
          BINARY="target/${{ matrix.target }}/release/ryra"

          mkdir -p pkgroot/usr/bin
          cp "$BINARY" pkgroot/usr/bin/ryra

          cat > pkgroot/.PKGINFO <<EOF
          pkgname = ryra
          pkgver = ${VERSION}-1
          pkgdesc = A tool to test and deploy self-hosted services
          url = https://ryra.dev
          builddate = $(date +%s)
          packager = GitHub Actions
          size = $(stat -c%s "$BINARY")
          arch = ${ARCH}
          license = AGPL-3.0-or-later
          EOF
          sed -i 's/^          //' pkgroot/.PKGINFO

          cd pkgroot
          LANG=C bsdtar -czf .MTREE --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
            .PKGINFO usr/
          LANG=C bsdtar -cf "../ryra-${VERSION}-1-${ARCH}.pkg.tar.zst" --zstd \
            .MTREE .PKGINFO usr/
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: ryra-${{ matrix.target }}
          path: |
            ryra-*-${{ matrix.target }}.tar.gz
            ryra-*-${{ matrix.target }}.tar.gz.asc
            ryra-${{ matrix.target }}.tar.gz
            ryra-${{ matrix.target }}.tar.gz.asc
            ryra_${{ matrix.deb_arch }}.deb
            ryra.${{ matrix.rpm_arch }}.rpm
            ryra-*-${{ matrix.rpm_arch }}.pkg.tar.zst

  release-latest:
    needs: [build-linux]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest
          body: Built from the latest commit on main.
          artifacts: "ryra-*.tar.gz,ryra-*.tar.gz.asc,ryra_*.deb,ryra.*.rpm,ryra-*.pkg.tar.zst"
          allowUpdates: true
          removeArtifacts: true
          prerelease: true
          makeLatest: false

  release-version:
    needs: [build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CARGO_VER}"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: "ryra-*.tar.gz,ryra-*.tar.gz.asc,ryra_*.deb,ryra.*.rpm,ryra-*.pkg.tar.zst"
          makeLatest: true

  deploy-pages:
    needs: build-linux
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Build site
        working-directory: site
        run: |
          bun install --frozen-lockfile
          bun run build

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Import GPG key
        env:
          APT_GPG_PRIVATE: ${{ secrets.APT_GPG_PRIVATE }}
        run: echo "$APT_GPG_PRIVATE" | gpg --batch --import

      - name: Install repo tools
        run: sudo apt-get update && sudo apt-get install -y createrepo-c

      - name: Assemble APT repository
        run: |
          mkdir -p site/dist/deb/pool \
            site/dist/deb/dists/stable/main/binary-amd64 \
            site/dist/deb/dists/stable/main/binary-arm64

          cp artifacts/ryra_amd64.deb site/dist/deb/pool/
          cp artifacts/ryra_arm64.deb site/dist/deb/pool/

          cd site/dist/deb

          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          dpkg-scanpackages --arch arm64 pool > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          cd dists/stable
          cat > Release <<EOF
          Origin: ryra
          Label: ryra
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          EOF
          sed -i 's/^          //' Release
          apt-ftparchive release . >> Release
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clearsign -o InRelease Release

      - name: Assemble RPM repository
        run: |
          mkdir -p site/dist/rpm/x86_64 site/dist/rpm/aarch64

          cp artifacts/ryra.x86_64.rpm site/dist/rpm/x86_64/
          cp artifacts/ryra.aarch64.rpm site/dist/rpm/aarch64/

          createrepo_c site/dist/rpm/x86_64
          createrepo_c site/dist/rpm/aarch64

          gpg --batch --yes --armor --detach-sign -o site/dist/rpm/x86_64/repodata/repomd.xml.asc site/dist/rpm/x86_64/repodata/repomd.xml
          gpg --batch --yes --armor --detach-sign -o site/dist/rpm/aarch64/repodata/repomd.xml.asc site/dist/rpm/aarch64/repodata/repomd.xml

      - name: Assemble Pacman repository
        run: |
          mkdir -p site/dist/pacman/x86_64 site/dist/pacman/aarch64

          cp artifacts/ryra-*-x86_64.pkg.tar.zst site/dist/pacman/x86_64/
          cp artifacts/ryra-*-aarch64.pkg.tar.zst site/dist/pacman/aarch64/

          docker run --rm -v "$PWD/site/dist/pacman:/repo" archlinux:latest bash -c '
            pacman -Sy --noconfirm
            repo-add /repo/x86_64/ryra.db.tar.gz /repo/x86_64/*.pkg.tar.zst
            repo-add /repo/aarch64/ryra.db.tar.gz /repo/aarch64/*.pkg.tar.zst
          '

      - name: Export GPG public key
        run: gpg --armor --export > site/dist/gpg.key

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-crates:
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Read workspace version
        id: version
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Workspace version: ${VER}"

      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish() {
            local pkg="$1"
            local out
            if out=$(cargo publish -p "$pkg" 2>&1); then
              printf '%s\n' "$out"
              return 0
            fi
            printf '%s\n' "$out"
            if printf '%s' "$out" | grep -q "already exists on crates.io index"; then
              echo "::notice::${pkg} already published at this version, skipping"
              return 0
            fi
            return 1
          }
          publish ryra-vm
          publish ryra-core
          publish ryra-test
          publish ryra

      - name: Tag the release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already on origin, skipping"
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "${TAG}"
          git push origin "${TAG}"
