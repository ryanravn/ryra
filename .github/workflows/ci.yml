name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace


  build-linux:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            deb_arch: amd64
            rpm_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            deb_arch: arm64
            rpm_arch: aarch64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
          sudo apt-get update && sudo apt-get install -y libarchive-tools zstd rpm

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p ryra

      - name: Package tarball
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cd target/${{ matrix.target }}/release
          tar czf "ryra-${VERSION}-${{ matrix.target }}.tar.gz" ryra
          mv "ryra-${VERSION}-${{ matrix.target }}.tar.gz" "$GITHUB_WORKSPACE/"
          # install.sh fetches a stable versionless filename from the
          # `latest` release so it doesn't need to discover the version
          # out-of-band. Produce that alongside the versioned tarball.
          cp "$GITHUB_WORKSPACE/ryra-${VERSION}-${{ matrix.target }}.tar.gz" \
             "$GITHUB_WORKSPACE/ryra-${{ matrix.target }}.tar.gz"

      - name: Sign tarballs
        env:
          APT_GPG_PRIVATE: ${{ secrets.APT_GPG_PRIVATE }}
        run: |
          echo "$APT_GPG_PRIVATE" | gpg --batch --import
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          gpg --batch --yes --detach-sign --armor \
            --output "ryra-${VERSION}-${{ matrix.target }}.tar.gz.asc" \
            "ryra-${VERSION}-${{ matrix.target }}.tar.gz"
          # Versionless copy is byte-identical, so one signature covers both.
          cp "ryra-${VERSION}-${{ matrix.target }}.tar.gz.asc" \
             "ryra-${{ matrix.target }}.tar.gz.asc"

      - name: Build deb
        run: |
          cargo deb -p ryra --no-build --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb ./ryra_${{ matrix.deb_arch }}.deb

      - name: Build rpm
        run: |
          cargo generate-rpm -p crates/ryra --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/generate-rpm/*.rpm ./ryra.${{ matrix.rpm_arch }}.rpm

      - name: Sign rpm
        run: |
          # GPG key already imported in "Sign tarballs" step above.
          # dnf with gpgcheck=1 verifies each package's embedded signature,
          # so the .rpm itself must be signed (createrepo's repomd.xml.asc
          # is repo_gpgcheck, a separate thing).
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/ {print $5; exit}')
          if [ -z "$KEY_ID" ]; then
            echo "::error::No secret GPG key found for RPM signing"
            exit 1
          fi
          # Default %__gpg_sign_cmd expects gpg-agent / interactive pinentry.
          # In CI there's no TTY, so force loopback and an empty passphrase
          # (the APT_GPG_PRIVATE key has none, matching how gpg --batch is
          # used for tarballs and repo metadata).
          cat > ~/.rpmmacros <<EOF
          %_gpg_name ${KEY_ID}
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-tty --pinentry-mode loopback --passphrase '' --no-verbose --no-armor --no-secmem-warning --digest-algo sha256 -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          EOF
          sed -i 's/^          //' ~/.rpmmacros
          rpmsign --addsign ryra.${{ matrix.rpm_arch }}.rpm
          # Modern rpmsign writes a V4 RSA header signature (RSAHEADER tag);
          # the legacy SIGPGP/SIGGPG tags stay empty. Check both.
          sig=$(rpm -qp --queryformat '%{RSAHEADER:pgpsig}|%{SIGPGP:pgpsig}' ryra.${{ matrix.rpm_arch }}.rpm)
          case "$sig" in
            "(none)|(none)"|"|")
              echo "::error::RPM was not signed ($sig)"
              exit 1
              ;;
          esac
          echo "Signed: $sig"

      - name: Build pacman package
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          ARCH="${{ matrix.rpm_arch }}"
          BINARY="target/${{ matrix.target }}/release/ryra"

          mkdir -p pkgroot/usr/bin
          cp "$BINARY" pkgroot/usr/bin/ryra

          cat > pkgroot/.PKGINFO <<EOF
          pkgname = ryra
          pkgver = ${VERSION}-1
          pkgdesc = A tool to test and deploy self-hosted services
          url = https://ryra.dev
          builddate = $(date +%s)
          packager = GitHub Actions
          size = $(stat -c%s "$BINARY")
          arch = ${ARCH}
          license = AGPL-3.0-or-later
          EOF
          sed -i 's/^          //' pkgroot/.PKGINFO

          cd pkgroot
          LANG=C bsdtar -czf .MTREE --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
            .PKGINFO usr/
          LANG=C bsdtar -cf "../ryra-${VERSION}-1-${ARCH}.pkg.tar.zst" --zstd \
            .MTREE .PKGINFO usr/
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: ryra-${{ matrix.target }}
          path: |
            ryra-*-${{ matrix.target }}.tar.gz
            ryra-*-${{ matrix.target }}.tar.gz.asc
            ryra-${{ matrix.target }}.tar.gz
            ryra-${{ matrix.target }}.tar.gz.asc
            ryra_${{ matrix.deb_arch }}.deb
            ryra.${{ matrix.rpm_arch }}.rpm
            ryra-*-${{ matrix.rpm_arch }}.pkg.tar.zst

  release-version:
    needs: [build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # actions: write lets us dispatch the deploy-pages workflow once
      # the GitHub release exists. Dispatching with --ref main keeps the
      # deploy on a ref the github-pages env protection allows.
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CARGO_VER}"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: "ryra-*.tar.gz,ryra-*.tar.gz.asc,ryra_*.deb,ryra.*.rpm,ryra-*.pkg.tar.zst"
          makeLatest: true

      - name: Trigger pages deploy with new release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-pages.yml \
            --ref main \
            -f release_tag="${{ github.ref_name }}" \
            --repo "${{ github.repository }}"

  publish-crates:
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Read workspace version
        id: version
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Workspace version: ${VER}"

      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish() {
            local pkg="$1"
            local out
            if out=$(cargo publish -p "$pkg" 2>&1); then
              printf '%s\n' "$out"
              return 0
            fi
            printf '%s\n' "$out"
            if printf '%s' "$out" | grep -q "already exists on crates.io index"; then
              echo "::notice::${pkg} already published at this version, skipping"
              return 0
            fi
            return 1
          }
          publish ryra-vm
          publish ryra-core
          publish ryra-test
          publish ryra

      - name: Tag the release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already on origin, skipping"
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "${TAG}"
          git push origin "${TAG}"
