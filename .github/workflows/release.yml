name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p ryra-cli

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ryra-${{ matrix.target }}.tar.gz ryra
          mv ryra-${{ matrix.target }}.tar.gz "$GITHUB_WORKSPACE/"

      - uses: actions/upload-artifact@v4
        with:
          name: ryra-${{ matrix.target }}
          path: ryra-${{ matrix.target }}.tar.gz

  release-latest:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest
          body: Built from the latest commit on main.
          artifacts: "ryra-*.tar.gz"
          allowUpdates: true
          removeArtifacts: true
          prerelease: true
          makeLatest: false

  release-version:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: "ryra-*.tar.gz"
          makeLatest: true
