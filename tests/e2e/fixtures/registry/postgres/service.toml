[service]
name = "postgres"
description = "PostgreSQL relational database"
image = "docker.io/library/postgres:17-alpine"
kind = "infrastructure"

[[ports]]
name = "tcp"
container_port = 5432

[[volumes]]
name = "data"
mount_path = "/var/lib/postgresql/data"

[[env]]
name = "POSTGRES_PASSWORD"
value = "{{secret.postgres_password}}"

[[env]]
name = "POSTGRES_USER"
value = "ryra"

[[env]]
name = "POSTGRES_DB"
value = "ryra"

[integrations]
auth = false
smtp = false

[[tests]]
name = "accepts-connections"
run = "PGPASSWORD=$POSTGRES_PASSWORD psql -h 127.0.0.1 -p $RYRA_PORT_TCP -U $POSTGRES_USER -c 'SELECT 1'"
timeout = 60

[[tests]]
name = "user-created"
run = "id ryra-postgres"

[[tests]]
name = "data-dir-exists"
run = "test -d /var/lib/postgres"
