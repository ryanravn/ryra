[[steps]]
action = "add"
service = "ente"

[[steps]]
action = "wait"
service = "ente"

[[steps]]
action = "http"
name = "api-ping"
url = "http://localhost:$RYRA_PORT_HTTP/ping"
service = "ente"
poll = { interval = 2, attempts = 60 }
timeout = 150

[[steps]]
action = "http"
name = "photos-web"
url = "http://localhost:$RYRA_PORT_PHOTOS/"
service = "ente"
poll = { interval = 2, attempts = 30 }
timeout = 90

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/ente"
timeout = 5
