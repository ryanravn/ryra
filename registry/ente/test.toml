# ente tests — install only (API + photos web).

[[tests]]
name = "ente"
[[tests.steps]]
action = "add"
service = "ente"
[[tests.steps]]
action = "wait"
service = "ente"
[[tests.steps]]
action = "http"
name = "api-ping"
url = "http://localhost:$RYRA_PORT_HTTP/ping"
service = "ente"
poll = { interval = 2, attempts = 60 }
timeout = 150
[[tests.steps]]
action = "http"
name = "photos-web"
url = "http://localhost:$RYRA_PORT_PHOTOS/"
service = "ente"
poll = { interval = 2, attempts = 30 }
timeout = 90
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/ente"
timeout = 5
