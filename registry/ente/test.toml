[setup]
services = ["ente"]

[[tests]]
name = "api-ping"
run = "for i in $(seq 1 60); do curl -sf http://localhost:$RYRA_PORT_HTTP/ping && exit 0; sleep 2; done; exit 1"
timeout = 150

[[tests]]
name = "photos-web"
run = "for i in $(seq 1 30); do curl -so /dev/null -w '%{http_code}' http://localhost:$RYRA_PORT_PHOTOS/ | grep -q '200' && exit 0; sleep 2; done; exit 1"
timeout = 90

[[tests]]
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/ente"
timeout = 5
