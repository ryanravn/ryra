[[steps]]
action = "add"
service = "uptime-kuma"

[[steps]]
action = "wait"
service = "uptime-kuma"

[[steps]]
action = "http"
name = "http-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "uptime-kuma"
poll = { interval = 2, attempts = 20 }
timeout = 60

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/uptime-kuma"
