# uptime-kuma tests — install only.

[[tests]]
name = "uptime-kuma"
[[tests.steps]]
action = "add"
service = "uptime-kuma"
[[tests.steps]]
action = "wait"
service = "uptime-kuma"
[[tests.steps]]
action = "http"
name = "http-responds"
url = "http://127.0.0.1:$PORT_HTTP"
service = "uptime-kuma"
poll = { interval = 2, attempts = 20 }
timeout = 60
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/services/uptime-kuma"
