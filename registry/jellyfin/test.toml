[[steps]]
action = "add"
service = "jellyfin"

[[steps]]
action = "wait"
service = "jellyfin"

[[steps]]
action = "http"
name = "jellyfin-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/health"
service = "jellyfin"
poll = { interval = 5, attempts = 30 }
timeout = 180

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/jellyfin"
