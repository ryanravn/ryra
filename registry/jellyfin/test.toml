# jellyfin tests — basic install + OIDC browser SSO flow.

[[tests]]
name = "jellyfin"
[[tests.steps]]
action = "add"
service = "jellyfin"
[[tests.steps]]
action = "wait"
service = "jellyfin"
[[tests.steps]]
action = "http"
name = "jellyfin-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/health"
service = "jellyfin"
poll = { interval = 5, attempts = 30 }
timeout = 180
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/jellyfin"

# Full SSO flow: complete startup wizard via API, verify SSO plugin,
# then run the playwright OIDC login spec.
[[tests]]
name = "oidc"
browser = true
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "add"
service = "jellyfin"
args = "--auth"
timeout = 300
[[tests.steps]]
action = "wait"
service = "jellyfin"
[[tests.steps]]
action = "http"
name = "jellyfin-http-ready"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/health"
service = "jellyfin"
poll = { interval = 5, attempts = 60 }
timeout = 360
[[tests.steps]]
action = "shell"
name = "complete-wizard"
run = """
PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/jellyfin/.env | cut -d= -f2)
BASE="http://127.0.0.1:$PORT"
wait_ready() { for i in $(seq 1 30); do curl -sf "$BASE/health" >/dev/null 2>&1 && return 0; sleep 2; done; return 1; }
wait_ready
curl -X POST "$BASE/Startup/Configuration" \
  -H 'Content-Type: application/json' \
  -d '{"UICulture":"en-US","MetadataCountryCode":"US","PreferredMetadataLanguage":"en"}' -o /dev/null -s
wait_ready
curl -X POST "$BASE/Startup/User" \
  -H 'Content-Type: application/json' \
  -d '{"Name":"admin","Password":"testpassword123"}' -o /dev/null -s
wait_ready
curl -X POST "$BASE/Startup/RemoteAccess" \
  -H 'Content-Type: application/json' \
  -d '{"EnableRemoteAccess":true,"EnableAutomaticPortMapping":false}' -o /dev/null -s
wait_ready
curl -X POST "$BASE/Startup/Complete" -o /dev/null -s
wait_ready
"""
timeout = 120
[[tests.steps]]
action = "shell"
name = "sso-plugin-loaded"
run = """
PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/jellyfin/.env | cut -d= -f2)
for i in $(seq 1 30); do
  NAMES=$(curl -sf "http://127.0.0.1:$PORT/sso/OID/GetNames" 2>/dev/null)
  if echo "$NAMES" | grep -q "authelia"; then echo "SSO ready: $NAMES"; exit 0; fi
  sleep 2
done
echo "SSO plugin not loaded after 60s"
exit 1
"""
timeout = 90
[[tests.steps]]
action = "playwright"
name = "playwright-sso-tests"
spec = "jellyfin-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
