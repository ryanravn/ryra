[service]
name = "postgres"
description = "PostgreSQL - open source relational database"
mode = "quadlet"
image = "docker.io/library/postgres:17-alpine"
kind = "infrastructure"

[[ports]]
name = "tcp"
container_port = 5432

[[volumes]]
name = "data"
mount_path = "/var/lib/postgresql/data"

[[env]]
name = "POSTGRES_USER"
value = "postgres"
prompt = "Database admin username"

[[env]]
name = "POSTGRES_DB"
value = "postgres"
prompt = "Default database name"

[[env]]
name = "POSTGRES_PASSWORD"
value = "{{secret.postgres_password}}"

[integrations]
auth = false
smtp = false
