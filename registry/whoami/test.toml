[[steps]]
action = "add"
service = "whoami"

[[steps]]
action = "wait"
service = "whoami"

[[steps]]
action = "http"
name = "http-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "whoami"

[[steps]]
action = "shell"
name = "returns-hostname"
run = ". $HOME/.local/share/ryra/whoami/.env && curl -s http://127.0.0.1:$RYRA_PORT_HTTP | grep -q Hostname"

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/whoami"
