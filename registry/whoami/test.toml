# whoami tests — sanity checks for the simplest possible service.
#
# This file uses the new [[tests]] + [[tests.steps]] multi-test format.
# Each test is a self-contained lifecycle run in its own VM. The
# service-owning file is the default prefix for test names: `diff`
# becomes `whoami-diff`, `remove` becomes `whoami-remove`. The first
# test is named exactly "whoami" so `ryra test whoami` still works.

# Basic install: add, wait, probe HTTP, assert data dir + env sourcing.
[[tests]]
name = "whoami"
[[tests.steps]]
action = "add"
service = "whoami"
[[tests.steps]]
action = "wait"
service = "whoami"
[[tests.steps]]
action = "http"
name = "http-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "whoami"
[[tests.steps]]
action = "shell"
name = "returns-hostname"
run = ". $HOME/.local/share/ryra/whoami/.env && curl -s http://127.0.0.1:$RYRA_PORT_HTTP | grep -q Hostname"
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/whoami"

# `ryra diff` against the bundled registry: snapshot saved on add, clean
# after add, shows an upstream change when we mutate the cached registry,
# and snapshot is cleaned up on remove.
[[tests]]
name = "diff"
[[tests.steps]]
action = "add"
service = "whoami"
[[tests.steps]]
action = "wait"
service = "whoami"
[[tests.steps]]
action = "shell"
name = "snapshot-saved"
run = "test -f $HOME/.config/ryra/snapshots/whoami.toml"
[[tests.steps]]
action = "shell"
name = "diff-no-changes"
run = "ryra diff whoami 2>&1 | grep -q 'up to date'"
[[tests.steps]]
action = "shell"
name = "simulate-upstream-change"
run = """cat >> $HOME/.cache/ryra/bundled/whoami/service.toml <<'TOML'

[[env]]
name = "NEW_VAR"
value = "hello"
TOML"""
[[tests.steps]]
action = "shell"
name = "diff-shows-change"
run = "ryra diff whoami 2>&1 | grep -q 'env var added: NEW_VAR'"
[[tests.steps]]
action = "remove"
service = "whoami"
[[tests.steps]]
action = "shell"
name = "snapshot-removed"
run = "test ! -f $HOME/.config/ryra/snapshots/whoami.toml"

# Remove lifecycle: add, verify, remove, verify cleanup.
[[tests]]
name = "remove"
[[tests.steps]]
action = "add"
service = "whoami"
[[tests.steps]]
action = "wait"
service = "whoami"
[[tests.steps]]
action = "http"
name = "whoami-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "whoami"
[[tests.steps]]
action = "shell"
name = "data-dir-exists"
run = "test -d $HOME/.local/share/ryra/whoami"
[[tests.steps]]
action = "shell"
name = "config-has-whoami"
run = "grep -q whoami $HOME/.config/ryra/ryra.toml"
[[tests.steps]]
action = "remove"
service = "whoami"
[[tests.steps]]
action = "shell"
name = "service-stopped"
run = "! systemctl --user is-active whoami.service 2>/dev/null"
[[tests.steps]]
action = "shell"
name = "config-cleaned"
run = "! grep -q whoami $HOME/.config/ryra/ryra.toml"
[[tests.steps]]
action = "shell"
name = "data-dir-removed"
run = "test ! -d $HOME/.local/share/ryra/whoami"
