[service]
name = "forgejo"
description = "Forgejo - self-hosted Git forge"
url = "https://forgejo.org/docs/"
architecture = ["amd64", "arm64"]
https = "auth"

[requirements.ram]
min = 256
recommended = 512

[[ports]]
name = "http"
container_port = 3000

# --- Postgres env vars (shared via .env with the postgres sidecar) ---

[[env]]
name = "POSTGRES_USER"
value = "forgejo"

[[env]]
name = "POSTGRES_PASSWORD"
value = "{{secret.db_password}}"

[[env]]
name = "POSTGRES_DB"
value = "forgejo"

# --- Forgejo env vars ---

[[env]]
name = "FORGEJO__database__DB_TYPE"
value = "postgres"

[[env]]
name = "FORGEJO__database__HOST"
value = "postgres:5432"

[[env]]
name = "FORGEJO__database__NAME"
value = "forgejo"

[[env]]
name = "FORGEJO__database__USER"
value = "forgejo"

[[env]]
name = "FORGEJO__database__PASSWD"
value = "{{secret.db_password}}"

[[env]]
name = "FORGEJO__server__DOMAIN"
value = "localhost"

[[env]]
name = "FORGEJO__server__ROOT_URL"
value = "{{service.external_url}}/"

[[env]]
name = "FORGEJO__service__DISABLE_REGISTRATION"
value = "true"

[[env]]
name = "FORGEJO__security__INSTALL_LOCK"
value = "true"

# Expose /metrics on the main HTTP port for Prometheus scrape.
# Forgejo serves these under the same listener as the web UI.
[[env]]
name = "FORGEJO__metrics__ENABLED"
value = "true"

[integrations]
auth = ["oidc"]
oidc_callbacks = ["/user/oauth2/Authelia/callback"]
smtp = true
prometheus = true

[mappings.auth]
FORGEJO__openid__ENABLE_OPENID_SIGNIN = "true"
FORGEJO__service__ENABLE_OPENID_SIGNIN = "true"
FORGEJO__oauth2_client__OPENID_CONNECT_SCOPES = "openid email profile"
FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION = "true"
FORGEJO__oauth2_client__ENABLE_OPENID_CONNECT_INSECURE_SKIP_VERIFY = "true"
OIDC_CLIENT_ID = "{{auth.client_id}}"
OIDC_CLIENT_SECRET = "{{auth.client_secret}}"
OIDC_DISCOVERY_URL = "{{auth.issuer}}/.well-known/openid-configuration"
OIDC_AUTH_URL = "{{auth.external_url}}/api/oidc/authorization"
OIDC_TOKEN_URL = "{{auth.internal_url}}/api/oidc/token"
OIDC_PROFILE_URL = "{{auth.internal_url}}/api/oidc/userinfo"

[mappings.smtp]
FORGEJO__mailer__ENABLED = "true"
FORGEJO__mailer__SMTP_ADDR = "{{smtp.host}}"
FORGEJO__mailer__SMTP_PORT = "{{smtp.port}}"
FORGEJO__mailer__USER = "{{smtp.username}}"
FORGEJO__mailer__PASSWD = "{{smtp.password}}"
FORGEJO__mailer__FROM = "{{smtp.from}}"
FORGEJO__mailer__PROTOCOL = "{{smtp.security | forgejo_protocol}}"
FORGEJO__service__ENABLE_NOTIFY_MAIL = "true"
