[[steps]]
action = "add"
service = "forgejo"

[[steps]]
action = "wait"
service = "forgejo"

[[steps]]
action = "http"
name = "forgejo-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "forgejo"
poll = { interval = 2, attempts = 30 }
timeout = 90

[[steps]]
action = "shell"
name = "postgres-not-on-localhost"
run = "! ss -tlnp | grep -q ':5432 '"
timeout = 5

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/forgejo"
