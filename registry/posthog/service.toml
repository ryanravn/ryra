[service]
name = "posthog"
description = "PostHog - open source product analytics, session replay, and feature flags"
url = "https://posthog.com/docs/self-host"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 4096
recommended = 4096

[[ports]]
name = "http"
container_port = 8000

# --- PostHog application ---

[[env]]
name = "SECRET_KEY"
value = "{{secret.secret_key}}"

[[env]]
name = "ENCRYPTION_SALT_KEYS"
value = "{{secret.encryption_salt}}"
format = "hex"

[[env]]
name = "SITE_URL"
value = "{{service.url}}"

[[env]]
name = "DEPLOYMENT"
value = "hobby"

# --- Database ---

[[env]]
name = "DATABASE_URL"
value = "postgres://posthog:posthog@db:5432/posthog"

# --- Redis ---

[[env]]
name = "REDIS_URL"
value = "redis://redis7:6379/"

# --- Kafka ---

[[env]]
name = "KAFKA_HOSTS"
value = "kafka:9092"

# --- ClickHouse ---

[[env]]
name = "CLICKHOUSE_HOST"
value = "clickhouse"

[[env]]
name = "CLICKHOUSE_DATABASE"
value = "posthog"

[[env]]
name = "CLICKHOUSE_SECURE"
value = "false"

[[env]]
name = "CLICKHOUSE_VERIFY"
value = "false"

# --- Object Storage (MinIO) ---

[[env]]
name = "OBJECT_STORAGE_ENDPOINT"
value = "http://objectstorage:19000"

[[env]]
name = "OBJECT_STORAGE_ACCESS_KEY_ID"
value = "object_storage_root_user"

[[env]]
name = "OBJECT_STORAGE_SECRET_ACCESS_KEY"
value = "object_storage_root_password"

[[env]]
name = "OBJECT_STORAGE_BUCKET"
value = "posthog"

[[env]]
name = "OBJECT_STORAGE_ENABLED"
value = "true"

[[env]]
name = "MINIO_ROOT_USER"
value = "object_storage_root_user"

[[env]]
name = "MINIO_ROOT_PASSWORD"
value = "object_storage_root_password"

# --- Misc ---

[[env]]
name = "DISABLE_SECURE_SSL_REDIRECT"
value = "true"

[[env]]
name = "IS_BEHIND_PROXY"
value = "true"

[[env]]
name = "ASYNC_EVENT_PROPERTY_USAGE"
value = "true"

[integrations]
auth = []
smtp = false
