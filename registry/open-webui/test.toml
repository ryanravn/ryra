[[steps]]
action = "add"
service = "open-webui"
env = { OLLAMA_BASE_URL = "" }

[[steps]]
action = "wait"
service = "open-webui"

[[steps]]
action = "http"
name = "open-webui-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "open-webui"
poll = { interval = 2, attempts = 30 }
timeout = 90

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/open-webui"
timeout = 10
