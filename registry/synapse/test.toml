# synapse tests — basic Element+homeserver install + OIDC browser flow.

[[tests]]
name = "synapse"
[[tests.steps]]
action = "add"
service = "synapse"
timeout = 600
[[tests.steps]]
action = "wait"
service = "synapse"
[[tests.steps]]
action = "http"
name = "element-responds"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP"
service = "synapse"
poll = { interval = 2, attempts = 45 }
timeout = 120
[[tests.steps]]
action = "http"
name = "synapse-client-versions"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP/_matrix/client/versions"
service = "synapse"
poll = { interval = 2, attempts = 45 }
timeout = 120
[[tests.steps]]
action = "http"
name = "element-config-json"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP/config.json"
service = "synapse"
poll = { interval = 2, attempts = 5 }
timeout = 20
[[tests.steps]]
action = "shell"
name = "homeserver-yaml-rendered"
run = "test -f $HOME/.local/share/services/synapse/data/homeserver.yaml"
timeout = 10

# OIDC browser flow — Element loads via Caddy on chat.internal, Synapse
# advertises OIDC in its login flows.
[[tests]]
name = "oidc"
browser = true
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.internal:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "add"
service = "synapse"
args = "--auth --url https://chat.internal:8443"
timeout = 600
[[tests.steps]]
action = "wait"
service = "synapse"
[[tests.steps]]
action = "http"
name = "element-responds"
url = "https://chat.internal:8443"
service = "synapse"
poll = { interval = 2, attempts = 30 }
timeout = 90
[[tests.steps]]
action = "shell"
name = "oidc-advertised"
run = """for i in $(seq 1 45); do
  curl -skL https://chat.internal:8443/_matrix/client/v3/login 2>/dev/null | grep -q 'oidc-authelia' && exit 0
  sleep 2
done
echo "OIDC not advertised after 90s"
curl -skL https://chat.internal:8443/_matrix/client/v3/login || true
exit 1"""
timeout = 120
[[tests.steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "synapse-auth.spec.ts"
timeout = 180
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123", SYNAPSE_URL = "https://chat.internal:8443" }
