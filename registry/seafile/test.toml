# seafile tests — SMTP delivery + OIDC browser SSO flow.
#
# There is no stand-alone "basic install" test for seafile: the service
# requires a domain (Caddy) to even come up, so the simplest meaningful
# test is already the SMTP flow below.

# SMTP via seahub's `manage.py sendtestemail`. Seafile's Python shim
# needs PYTHONPATH + several SEAFILE_* env vars that `seahub.sh` would
# normally set; we recreate them inline.
[[tests]]
name = "smtp"
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "seafile"
args = "--smtp=inbucket --url https://seafile.localhost:8443"
env = { INIT_SEAFILE_ADMIN_EMAIL = "smtptest@ryra.local", INIT_SEAFILE_ADMIN_PASSWORD = "Testing-Smtp-123!" }
timeout = 900
[[tests.steps]]
action = "wait"
service = "seafile"
[[tests.steps]]
action = "http"
name = "seafile-responds"
url = "https://seafile.localhost:8443"
service = "seafile"
poll = { interval = 3, attempts = 60 }
timeout = 240
[[tests.steps]]
action = "shell"
name = "trigger-smtp-mail"
run = """for i in $(seq 1 10); do
  podman exec seafile bash -c '
    INSTALLPATH=/opt/seafile/seafile-server-latest
    TOPDIR=/opt/seafile
    export PYTHONPATH=${INSTALLPATH}/seafile/lib/python3/site-packages:${INSTALLPATH}/seafile/lib64/python3/site-packages:${INSTALLPATH}/seahub:${INSTALLPATH}/seahub/thirdpart:${INSTALLPATH}/pro/python
    export SEAFES_DIR=${INSTALLPATH}/pro/python/seafes
    export SEAHUB_DIR=${INSTALLPATH}/seahub
    export SEAFILE_CENTRAL_CONF_DIR=${TOPDIR}/conf
    export CCNET_CONF_DIR=${TOPDIR}/ccnet
    export SEAFILE_CONF_DIR=${TOPDIR}/seafile-data
    export SEAFILE_DATA_DIR=${TOPDIR}/seafile-data
    export DJANGO_SETTINGS_MODULE=seahub.settings
    cd ${INSTALLPATH}
    python3 seahub/manage.py sendtestemail smtptest@ryra.local
  ' && exit 0
  sleep 3
done
exit 1"""
timeout = 90
[[tests.steps]]
action = "mail"
name = "mail-delivered-to-inbucket"
mailbox = "smtptest"
contains = "Test email from"

# OIDC browser flow — seafile goes through caddy over HTTPS.
timeout = 90

[[tests]]
name = "oidc"
browser = true
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "add"
service = "seafile"
args = "--auth --url https://seafile.localhost:8443"
env = { INIT_SEAFILE_ADMIN_EMAIL = "admin@test.local", INIT_SEAFILE_ADMIN_PASSWORD = "testpassword123" }
timeout = 900
[[tests.steps]]
action = "wait"
service = "seafile"
[[tests.steps]]
action = "http"
name = "seafile-http-ready"
url = "https://seafile.localhost:8443"
poll = { interval = 5, attempts = 60 }
timeout = 360
[[tests.steps]]
action = "playwright"
name = "playwright-sso"
spec = "seafile-auth.spec.ts"
timeout = 120
env = { SEAFILE_DOMAIN = "seafile.localhost:8443", AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
