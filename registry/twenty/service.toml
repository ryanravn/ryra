[service]
name = "twenty"
description = "Twenty - open-source CRM alternative to Salesforce"
url = "https://twenty.com/"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 1024
recommended = 2048

[[ports]]
name = "http"
container_port = 3000

# --- Postgres env vars (shared with postgres sidecar) ---

[[env]]
name = "POSTGRES_USER"
value = "twenty"

[[env]]
name = "POSTGRES_PASSWORD"
value = "{{secret.db_password}}"

[[env]]
name = "POSTGRES_DB"
value = "twenty"

# --- Twenty server env vars ---

[[env]]
name = "PG_DATABASE_URL"
value = "postgresql://twenty:{{secret.db_password}}@db:5432/twenty"

[[env]]
name = "REDIS_URL"
value = "redis://redis:6379"

[[env]]
name = "APP_SECRET"
value = "{{secret.app_secret}}"
format = "hex"
length = 64

[[env]]
name = "SERVER_URL"
value = "{{service.external_url}}"

[[env]]
name = "NODE_ENV"
value = "production"

[[env]]
name = "STORAGE_TYPE"
value = "local"

# --- Admin account (used for initial setup and OIDC registration) ---

[[env]]
name = "RYRA_ADMIN_EMAIL"
value = "admin@example.com"
kind = "prompted"
prompt = "Admin email"

[[env]]
name = "RYRA_ADMIN_PASSWORD"
value = "{{secret.admin_password}}"
kind = "prompted"
prompt = "Admin password"

# Twenty's OIDC/SSO integration is gated behind their enterprise
# license (see packages/twenty-server/.../enterprise-plan.service.ts).
# The legacy unsigned `ENTERPRISE_KEY=<anything>` fallback was removed
# in v1.23.0, and the EnterpriseFeaturesEnabledGuard's error handler
# crashes GraphQL contexts ("Cannot read properties of undefined
# (reading 'headers')" from guard-redirect.service.ts) even on
# v1.22.x. Until upstream fixes the guard or offers a self-host SSO
# path, ryra doesn't advertise `auth = ["oidc"]` for twenty — pair
# twenty with Caddy forward-auth if you need SSO in front of it.

[integrations]
auth = []
smtp = true

[mappings.smtp]
EMAIL_DRIVER = "smtp"
EMAIL_SMTP_HOST = "{{smtp.host}}"
EMAIL_SMTP_PORT = "{{smtp.port}}"
EMAIL_SMTP_USER = "{{smtp.username}}"
EMAIL_SMTP_PASSWORD = "{{smtp.password}}"
# Twenty's default is to opportunistically STARTTLS the connection; flip
# to "true" for plaintext SMTP servers (e.g. inbucket in tests).
EMAIL_SMTP_NO_TLS = "{{ smtp.security | smtp_no_tls }}"
# The app default is `noreply@yourdomain.com`, which bounces in most
# providers and shows up oddly in test sinks. Use the configured sender.
EMAIL_FROM_ADDRESS = "{{smtp.from}}"
EMAIL_FROM_NAME = "Twenty"
