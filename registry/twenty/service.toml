[service]
name = "twenty"
description = "Twenty - open-source CRM alternative to Salesforce"
url = "https://twenty.com/"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 1024
recommended = 2048

[[ports]]
name = "http"
container_port = 3000

# --- Postgres env vars (shared with postgres sidecar) ---

[[env]]
name = "POSTGRES_USER"
value = "twenty"

[[env]]
name = "POSTGRES_PASSWORD"
value = "{{secret.db_password}}"

[[env]]
name = "POSTGRES_DB"
value = "twenty"

# --- Twenty server env vars ---

[[env]]
name = "PG_DATABASE_URL"
value = "postgresql://twenty:{{secret.db_password}}@db:5432/twenty"

[[env]]
name = "REDIS_URL"
value = "redis://redis:6379"

[[env]]
name = "APP_SECRET"
value = "{{secret.app_secret}}"
format = "hex"
length = 64

[[env]]
name = "SERVER_URL"
value = "{{service.external_url}}"

[[env]]
name = "NODE_ENV"
value = "production"

[[env]]
name = "STORAGE_TYPE"
value = "local"

[integrations]
auth = []
smtp = true

[mappings.smtp]
EMAIL_DRIVER = "smtp"
EMAIL_SMTP_HOST = "{{smtp.host}}"
EMAIL_SMTP_PORT = "{{smtp.port}}"
EMAIL_SMTP_USER = "{{smtp.username}}"
EMAIL_SMTP_PASSWORD = "{{smtp.password}}"
# Twenty's default is to opportunistically STARTTLS the connection; flip
# to "true" for plaintext SMTP servers (e.g. inbucket in tests).
EMAIL_SMTP_NO_TLS = "{{ smtp.security | smtp_no_tls }}"
# The app default is `noreply@yourdomain.com`, which bounces in most
# providers and shows up oddly in test sinks. Use the configured sender.
EMAIL_FROM_ADDRESS = "{{smtp.from}}"
EMAIL_FROM_NAME = "Twenty"
