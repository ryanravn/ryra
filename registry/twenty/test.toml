# twenty tests — basic install + SMTP (onboarding invite).

[[tests]]
name = "twenty"
[[tests.steps]]
action = "add"
service = "twenty"
timeout = 600
[[tests.steps]]
action = "wait"
service = "twenty"
[[tests.steps]]
action = "http"
name = "twenty-responds"
url = "http://127.0.0.1:$PORT_HTTP"
service = "twenty"
poll = { interval = 5, attempts = 60 }
timeout = 300
[[tests.steps]]
action = "shell"
name = "postgres-not-on-localhost"
run = "! ss -tlnp | grep -q ':5432 '"
timeout = 5
[[tests.steps]]
action = "shell"
name = "redis-not-on-localhost"
run = "! ss -tlnp | grep -q ':6379 '"
timeout = 5
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/services/twenty"

# SMTP via onboarding invite flow — the playwright spec walks the UI and
# clicks Finish on the invite step. Mail delivery is async through bullmq
# → twenty-worker → SMTP.
[[tests]]
name = "smtp"
browser = true
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "twenty"
args = "--smtp=inbucket --url https://twenty.internal:8443"
timeout = 900
[[tests.steps]]
action = "wait"
service = "twenty"
[[tests.steps]]
action = "http"
name = "twenty-responds"
url = "https://twenty.internal:8443/healthz"
service = "twenty"
# Twenty's worker + server initial boot + DB migrations can take 2-3min
# on a cold VM. Match the non-smtp variant's poll budget.
poll = { interval = 5, attempts = 60 }
timeout = 360
[[tests.steps]]
action = "playwright"
name = "onboarding-invite-flow"
spec = "twenty-smtp.spec.ts"
timeout = 180
env = { TWENTY_URL = "https://twenty.internal:8443", INVITE_EMAIL = "smtptest@example.com" }
[[tests.steps]]
action = "mail"
name = "mail-delivered-to-inbucket"
mailbox = "smtptest"
contains = "Twenty"
poll = { interval = 2, attempts = 45 }
timeout = 120
