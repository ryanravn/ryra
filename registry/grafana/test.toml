# grafana tests — install + verify the bundled Prometheus datasource
# was auto-provisioned (the whole point of pairing grafana with
# prometheus is that users get working dashboards without clicking).

[[tests]]
name = "grafana"
[[tests.steps]]
action = "add"
service = "prometheus"
[[tests.steps]]
action = "wait"
service = "prometheus"
[[tests.steps]]
action = "add"
service = "grafana"
env = { GF_SECURITY_ADMIN_PASSWORD = "grafana-test-123" }
[[tests.steps]]
action = "wait"
service = "grafana"
[[tests.steps]]
action = "http"
name = "grafana-health"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/api/health"
service = "grafana"
poll = { interval = 2, attempts = 30 }
timeout = 90
# Confirms the file in configs/provisioning/datasources/prometheus.yml
# was mounted + read at grafana startup. "YWRtaW46Z3JhZmFuYS10ZXN0LTEyMw==" is
# base64("admin:grafana-test-123"); Grafana's /api/datasources requires auth.
[[tests.steps]]
action = "http"
name = "prometheus-datasource-provisioned"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/api/datasources"
service = "grafana"
headers = { Authorization = "Basic YWRtaW46Z3JhZmFuYS10ZXN0LTEyMw==" }
contains = "\"type\":\"prometheus\""
poll = { interval = 2, attempts = 15 }
timeout = 60

# Full OIDC flow: caddy (TLS) + authelia (IdP) + grafana --auth, then
# a Playwright spec that clicks Grafana's SSO button and completes the
# round-trip through Authelia back to an authenticated Grafana session.
[[tests]]
name = "oidc"
browser = true
ram = 2048
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "add"
service = "grafana"
args = "--auth"
env = { GF_SECURITY_ADMIN_PASSWORD = "grafana-test-123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "grafana"
[[tests.steps]]
action = "http"
name = "grafana-health"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/api/health"
service = "grafana"
poll = { interval = 2, attempts = 30 }
timeout = 90
[[tests.steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "grafana-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
