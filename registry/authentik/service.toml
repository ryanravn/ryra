[service]
name = "authentik"
description = "Authentik - identity provider with SSO and OIDC"
url = "https://docs.goauthentik.io/"
image = "ghcr.io/goauthentik/server:2025.2"
architecture = ["amd64", "arm64"]
command = "server"
kind = "infrastructure"

[requirements.ram]
min = 512
recommended = 1024

[[ports]]
name = "http"
container_port = 9000

[[volumes]]
name = "media"
mount_path = "/media"

[[volumes]]
name = "templates"
mount_path = "/templates"

[[volumes]]
name = "blueprints"
mount_path = "/blueprints/custom"
host_path = "%h/blueprints"

# --- Sidecar: worker (same image, different command) ---

[[containers]]
name = "worker"
image = "ghcr.io/goauthentik/server:2025.2"
command = "worker"
depends_on = ["postgres", "redis"]

[[containers.volumes]]
name = "media"
mount_path = "/media"

[[containers.volumes]]
name = "templates"
mount_path = "/templates"

[[containers.volumes]]
name = "blueprints"
mount_path = "/blueprints/custom"
host_path = "%h/blueprints"

# --- Sidecar: postgres ---

[[containers]]
name = "postgres"
image = "docker.io/library/postgres:17-alpine"

[[containers.volumes]]
name = "db-data"
mount_path = "/var/lib/postgresql/data"

[containers.healthcheck]
command = "pg_isready -d $POSTGRES_DB -U $POSTGRES_USER"
start_period = 20
interval = 30
retries = 5
timeout = 5

# --- Sidecar: redis ---

[[containers]]
name = "redis"
image = "docker.io/library/redis:7-alpine"
command = "--save 60 1 --loglevel warning"

[[containers.volumes]]
name = "redis-data"
mount_path = "/data"

[containers.healthcheck]
command = "redis-cli ping | grep PONG"
start_period = 20
interval = 30
retries = 5
timeout = 3

# --- Authentik env vars ---

[[env]]
name = "AUTHENTIK_SECRET_KEY"
value = "{{secret.secret_key}}"
format = "hex"
length = 50

[[env]]
name = "AUTHENTIK_BOOTSTRAP_TOKEN"
value = "{{secret.bootstrap_token}}"

[[env]]
name = "AUTHENTIK_BOOTSTRAP_EMAIL"
value = ""
kind = "required"
prompt = "Admin email"

[[env]]
name = "AUTHENTIK_BOOTSTRAP_PASSWORD"
value = ""
kind = "required"
prompt = "Admin password"

# --- Internal Postgres ---

[[env]]
name = "POSTGRES_USER"
value = "authentik"

[[env]]
name = "POSTGRES_PASSWORD"
value = "{{secret.db_password}}"

[[env]]
name = "POSTGRES_DB"
value = "authentik"

# --- Internal Redis ---

[[env]]
name = "AUTHENTIK_REDIS__HOST"
value = "redis"

# --- Postgres connection for Authentik ---

[[env]]
name = "AUTHENTIK_POSTGRESQL__HOST"
value = "postgres"

[[env]]
name = "AUTHENTIK_POSTGRESQL__USER"
value = "authentik"

[[env]]
name = "AUTHENTIK_POSTGRESQL__NAME"
value = "authentik"

[[env]]
name = "AUTHENTIK_POSTGRESQL__PASSWORD"
value = "{{secret.db_password}}"

[nginx]
upstream_port = "http"

[integrations]
auth = []
smtp = false

[[tests]]
name = "authentik-responds"
run = "for i in $(seq 1 120); do curl -sf http://127.0.0.1:$RYRA_PORT_HTTP/if/flow/initial-setup/ && exit 0; sleep 3; done; exit 1"
timeout = 420
env = { AUTHENTIK_BOOTSTRAP_EMAIL = "admin@test.local", AUTHENTIK_BOOTSTRAP_PASSWORD = "testpassword123" }

[[tests]]
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/authentik"
env = { AUTHENTIK_BOOTSTRAP_EMAIL = "admin@test.local", AUTHENTIK_BOOTSTRAP_PASSWORD = "testpassword123" }
