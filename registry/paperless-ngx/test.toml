# paperless-ngx tests — basic install, SMTP delivery, OIDC browser SSO.

[[tests]]
name = "paperless-ngx"
[[tests.steps]]
action = "add"
service = "paperless-ngx"
[[tests.steps]]
action = "wait"
service = "paperless-ngx"
[[tests.steps]]
action = "http"
name = "paperless-ngx-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "paperless-ngx"
poll = { interval = 5, attempts = 60 }
timeout = 330
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/paperless-ngx"
timeout = 10

# SMTP via Django's built-in `sendtestemail` management command —
# exercises the app's full ActionMailer stack.
[[tests]]
name = "smtp"
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "paperless-ngx"
args = "--smtp=inbucket"
timeout = 600
[[tests.steps]]
action = "wait"
service = "paperless-ngx"
[[tests.steps]]
action = "http"
name = "paperless-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "paperless-ngx"
poll = { interval = 2, attempts = 45 }
timeout = 180
[[tests.steps]]
action = "shell"
name = "trigger-smtp-mail"
run = """for i in $(seq 1 10); do
  podman exec paperless-ngx python manage.py sendtestemail smtptest@ryra.local && exit 0
  sleep 3
done
exit 1"""
timeout = 60
[[tests.steps]]
action = "shell"
name = "mail-delivered-to-inbucket"
run = """INBUCKET_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/inbucket/.env | cut -d= -f2)
for i in $(seq 1 30); do
  BODY=$(curl -sf http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest 2>/dev/null)
  if [ -n "$BODY" ] && [ "$BODY" != "[]" ]; then
    exit 0
  fi
  sleep 2
done
echo "no mail for smtptest@ryra.local after 60s"
curl -sf "http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest" || true
exit 1"""
timeout = 90

# OIDC browser flow.
[[tests]]
name = "auth-browser"
browser = true
ram = 2048
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "add"
service = "paperless-ngx"
args = "--auth"
env = { PAPERLESS_ADMIN_USER = "admin", PAPERLESS_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "paperless-ngx"
[[tests.steps]]
action = "http"
name = "paperless-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "paperless-ngx"
poll = { interval = 2, attempts = 30 }
timeout = 90
[[tests.steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "paperless-ngx-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
