# paperless-ngx tests — basic install, SMTP delivery, OIDC browser SSO.

[[tests]]
name = "paperless-ngx"
[[tests.steps]]
action = "add"
service = "paperless-ngx"
[[tests.steps]]
action = "wait"
service = "paperless-ngx"
[[tests.steps]]
action = "http"
name = "paperless-ngx-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "paperless-ngx"
poll = { interval = 5, attempts = 60 }
timeout = 330
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/paperless-ngx"
timeout = 10

# SMTP via Django's built-in `sendtestemail` management command —
# exercises the app's full ActionMailer stack.
[[tests]]
name = "smtp"
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "paperless-ngx"
args = "--smtp=inbucket"
timeout = 600
[[tests.steps]]
action = "wait"
service = "paperless-ngx"
[[tests.steps]]
action = "http"
name = "paperless-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "paperless-ngx"
poll = { interval = 2, attempts = 45 }
timeout = 180
[[tests.steps]]
action = "shell"
name = "trigger-smtp-mail"
run = """for i in $(seq 1 10); do
  podman exec paperless-ngx python manage.py sendtestemail smtptest@ryra.local && exit 0
  sleep 3
done
exit 1"""
timeout = 60
[[tests.steps]]
action = "mail"
name = "mail-delivered-to-inbucket"
mailbox = "smtptest"

# OIDC browser flow.
timeout = 90

[[tests]]
name = "oidc"
browser = true
ram = 2048
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "add"
service = "paperless-ngx"
args = "--auth"
env = { PAPERLESS_ADMIN_USER = "admin", PAPERLESS_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "paperless-ngx"
[[tests.steps]]
action = "http"
name = "paperless-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "paperless-ngx"
poll = { interval = 2, attempts = 30 }
timeout = 90
[[tests.steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "paperless-ngx-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
