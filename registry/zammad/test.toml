# zammad tests — install, autowizard-seeded admin, and full OIDC flow via
# authelia + caddy. AUTOWIZARD_JSON + run-autowizard.sh together remove
# the need for the first-run web wizard.

[[tests]]
name = "zammad"
[[tests.steps]]
action = "add"
service = "zammad"
timeout = 900
[[tests.steps]]
action = "wait"
service = "zammad"
[[tests.steps]]
action = "http"
name = "zammad-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "zammad"
poll = { interval = 5, attempts = 60 }
timeout = 300
[[tests.steps]]
action = "shell"
name = "postgres-not-on-localhost"
run = "! ss -tlnp | grep -q ':5432 '"
timeout = 5
[[tests.steps]]
action = "shell"
name = "elasticsearch-not-on-localhost"
run = "! ss -tlnp | grep -q ':9200 '"
timeout = 5
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/zammad"
[[tests.steps]]
action = "shell"
name = "autowizard-created-admin"
run = """for i in $(seq 1 60); do
  podman exec zammad-railsserver bundle exec rails r 'exit(User.joins(:roles).where(roles: { name: "Admin" }).exists? ? 0 : 1)' 2>/dev/null && exit 0
  sleep 5
done
exit 1"""
timeout = 300

# Full SSO flow: caddy (TLS), authelia (IdP), zammad wired up with
# --auth, then a Playwright spec that actually clicks through the login.
[[tests]]
name = "oidc"
browser = true
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123", AUTHELIA_ADMIN_EMAIL = "admin@example.com" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "add"
service = "zammad"
args = "--auth"
timeout = 900
[[tests.steps]]
action = "wait"
service = "zammad"
[[tests.steps]]
action = "shell"
name = "oidc-configured"
run = """for i in $(seq 1 60); do
  podman exec zammad-railsserver bundle exec rails r 'exit(Setting.get("auth_openid_connect") ? 0 : 1)' 2>/dev/null && exit 0
  sleep 5
done
echo "OIDC never enabled"
journalctl --user -u zammad.service --no-pager -n 30 2>&1 | grep -iE 'oidc|openid|error' || true
exit 1"""
timeout = 300
[[tests.steps]]
action = "http"
name = "zammad-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "zammad"
poll = { interval = 3, attempts = 60 }
timeout = 300
[[tests.steps]]
action = "http"
name = "authelia-via-caddy"
url = "https://auth.localhost:8443"
[[tests.steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "zammad-auth.spec.ts"
timeout = 180
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
