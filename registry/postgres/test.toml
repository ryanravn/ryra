[[steps]]
action = "add"
service = "postgres"

[[steps]]
action = "wait"
service = "postgres"

[[steps]]
action = "shell"
name = "accepts-connections"
run = ". $HOME/.local/share/ryra/postgres/.env && for i in $(seq 1 15); do PGPASSWORD=$POSTGRES_PASSWORD psql -h 127.0.0.1 -p $RYRA_PORT_TCP -U $POSTGRES_USER -c 'SELECT 1' && exit 0; sleep 2; done; exit 1"
timeout = 60

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/postgres"
