[service]
name = "authelia"
description = "Authelia - lightweight SSO and 2FA server"
url = "https://www.authelia.com/"
image = "docker.io/authelia/authelia:4.39"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 128
recommended = 256

[[ports]]
name = "http"
container_port = 9091

[[volumes]]
name = "config"
mount_path = "/config"
host_path = "%h/config"

# --- Env vars ---
# Authelia reads env vars with AUTHELIA_ prefix as config overrides.
# Secrets are injected via env vars, config file is generated as a post-start hook.

[[env]]
name = "AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET"
value = "{{secret.jwt_secret}}"
format = "hex"
length = 64

[[env]]
name = "AUTHELIA_SESSION_SECRET"
value = "{{secret.session_secret}}"
format = "hex"
length = 64

[[env]]
name = "AUTHELIA_STORAGE_ENCRYPTION_KEY"
value = "{{secret.storage_key}}"
format = "hex"
length = 64

[[env]]
name = "X_AUTHELIA_CONFIG_FILTERS"
value = "template"

[[env]]
name = "AUTHELIA_ADMIN_USER"
value = "admin"
kind = "prompted"
prompt = "Admin username"

[[env]]
name = "AUTHELIA_ADMIN_PASSWORD"
value = ""
kind = "required"
prompt = "Admin password"

[[env]]
name = "AUTHELIA_ADMIN_EMAIL"
value = "admin@localhost"
kind = "prompted"
prompt = "Admin email"

# Port for Caddy forward auth
[[env]]
name = "RYRA_AUTH_PORT"
value = "9091"

[integrations]
auth = []
smtp = false

# Config files (configuration.yml, users_database.yml) are generated
# by ryra core as WriteFile steps BEFORE authelia starts.
# No post-start hooks needed — avoids shell escaping and timing issues.

[[tests]]
name = "health-check"
run = "curl -sf http://127.0.0.1:$RYRA_PORT_HTTP/api/health"
timeout = 30

[[tests]]
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/authelia"
