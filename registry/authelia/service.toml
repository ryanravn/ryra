[service]
name = "authelia"
description = "Authelia - lightweight SSO and 2FA server"
url = "https://www.authelia.com/"
architecture = ["amd64", "arm64"]
https = "always"

[requirements.ram]
min = 128
recommended = 256

[[ports]]
name = "http"
container_port = 9091

# --- Env vars ---
# Authelia reads env vars with AUTHELIA_ prefix as config overrides.
# Secrets are injected via env vars, config file is generated by config scripts.

[[env]]
name = "AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET"
value = "{{secret.jwt_secret}}"
format = "hex"
length = 64

[[env]]
name = "AUTHELIA_SESSION_SECRET"
value = "{{secret.session_secret}}"
format = "hex"
length = 64

[[env]]
name = "AUTHELIA_STORAGE_ENCRYPTION_KEY"
value = "{{secret.storage_key}}"
format = "hex"
length = 64

[[env]]
name = "X_AUTHELIA_CONFIG_FILTERS"
value = "template"

[[env]]
name = "AUTHELIA_ADMIN_USER"
value = "admin"
kind = "prompted"
prompt = "Admin username"

[[env]]
name = "AUTHELIA_ADMIN_PASSWORD"
value = "{{secret.admin_password}}"
kind = "prompted"
prompt = "Admin password"

[[env]]
name = "AUTHELIA_ADMIN_EMAIL"
value = "{{admin.email | default('admin@example.com')}}"
kind = "prompted"
prompt = "Admin email"

[[env]]
name = "RYRA_DOMAIN"
value = "{{ service.domain | default('localhost') }}"

# Port for Caddy forward auth
[[env]]
name = "RYRA_AUTH_PORT"
value = "9091"

[integrations]
auth = []
smtp = true

[mappings.smtp]
AUTHELIA_NOTIFIER_SMTP_ADDRESS = "{{smtp.security | authelia_scheme}}://{{smtp.host}}:{{smtp.port}}"
AUTHELIA_NOTIFIER_SMTP_USERNAME = "{{smtp.username}}"
AUTHELIA_NOTIFIER_SMTP_PASSWORD = "{{smtp.password}}"
AUTHELIA_NOTIFIER_SMTP_SENDER = "{{smtp.from}}"
AUTHELIA_NOTIFIER_SMTP_DISABLE_REQUIRE_TLS = "true"
