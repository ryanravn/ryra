[service]
name = "authelia"
description = "Authelia - lightweight SSO and 2FA server"
url = "https://www.authelia.com/"
image = "docker.io/authelia/authelia:4.39"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 128
recommended = 256

[[ports]]
name = "http"
container_port = 9091

[[volumes]]
name = "config"
mount_path = "/config"
host_path = "%h/config"

# --- Env vars ---
# Authelia reads env vars with AUTHELIA_ prefix as config overrides.
# Secrets are injected via env vars, config file is generated as a post-start hook.

[[env]]
name = "AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET"
value = "{{secret.jwt_secret}}"
format = "hex"
length = 64

[[env]]
name = "AUTHELIA_SESSION_SECRET"
value = "{{secret.session_secret}}"
format = "hex"
length = 64

[[env]]
name = "AUTHELIA_STORAGE_ENCRYPTION_KEY"
value = "{{secret.storage_key}}"
format = "hex"
length = 64

[[env]]
name = "X_AUTHELIA_CONFIG_FILTERS"
value = "template"

[[env]]
name = "AUTHELIA_ADMIN_USER"
value = "admin"
kind = "prompted"
prompt = "Admin username"

[[env]]
name = "AUTHELIA_ADMIN_PASSWORD"
value = ""
kind = "required"
prompt = "Admin password"

[[env]]
name = "AUTHELIA_ADMIN_EMAIL"
value = "admin@localhost"
kind = "prompted"
prompt = "Admin email"

[[env]]
name = "RYRA_DOMAIN"
value = "{{ service.domain | default('localhost') }}"

# Port for Caddy forward auth
[[env]]
name = "RYRA_AUTH_PORT"
value = "9091"

[[pre_start]]
name = "generate-config"
timeout = 60
run = """
CONFIG_DIR="$HOME/.local/share/ryra/authelia/config"
mkdir -p "$CONFIG_DIR"
CONFIG_FILE="$CONFIG_DIR/configuration.yml"
[ -f "$CONFIG_FILE" ] && exit 0
DOMAIN="${RYRA_DOMAIN:-localhost}"
# Extract parent domain for session cookie: auth.test.local -> test.local
# Authelia requires cookie domain to have at least one period or be an IP.
if [ "$DOMAIN" = "localhost" ]; then
  COOKIE_DOMAIN="127.0.0.1"
elif echo "$DOMAIN" | grep -q '\\..*\\.'; then
  COOKIE_DOMAIN="${DOMAIN#*.}"
else
  COOKIE_DOMAIN="$DOMAIN"
fi
# authelia_url tells browsers where to find authelia for session validation.
# Authelia requires HTTPS scheme. With a real domain + Caddy, use Caddy's port.
# For standalone (localhost), use https://127.0.0.1 (authelia validates scheme only).
if [ "$DOMAIN" != "localhost" ] && systemctl --user is-active caddy.service >/dev/null 2>&1; then
  AUTHELIA_URL="https://$DOMAIN:8443"
else
  AUTHELIA_URL="https://$COOKIE_DOMAIN"
fi
SESSION_COOKIES="    - domain: '$COOKIE_DOMAIN'
      authelia_url: '$AUTHELIA_URL'"
cat > "$CONFIG_FILE" <<YAML
---
server:
  address: 'tcp://0.0.0.0:9091'
log:
  level: 'info'
authentication_backend:
  file:
    path: '/config/users_database.yml'
session:
  cookies:
$SESSION_COOKIES
storage:
  local:
    path: '/config/db.sqlite3'
notifier:
  filesystem:
    filename: '/config/notification.txt'
access_control:
  default_policy: 'one_factor'
YAML
"""

[[pre_start]]
name = "generate-users"
timeout = 120
run = """
CONFIG_DIR="$HOME/.local/share/ryra/authelia/config"
mkdir -p "$CONFIG_DIR"
USERS_FILE="$CONFIG_DIR/users_database.yml"
[ -f "$USERS_FILE" ] && exit 0
[ -z "$AUTHELIA_ADMIN_PASSWORD" ] && exit 0
USERNAME="${AUTHELIA_ADMIN_USER:-admin}"
EMAIL="${AUTHELIA_ADMIN_EMAIL:-admin@localhost}"
HASH=$(podman run --rm docker.io/authelia/authelia:4.39 authelia crypto hash generate argon2 --password "$AUTHELIA_ADMIN_PASSWORD" | grep '^Digest:' | sed 's/^Digest: //')
[ -z "$HASH" ] && exit 1
cat > "$USERS_FILE" <<YAML
---
users:
  $USERNAME:
    displayname: "$USERNAME"
    password: "$HASH"
    email: "$EMAIL"
YAML
"""

[[pre_start]]
name = "generate-oidc-rsa-key"
timeout = 120
run = """
CONFIG_DIR="$HOME/.local/share/ryra/authelia/config"
RSA_KEY="$CONFIG_DIR/oidc.jwk.rsa.pem"
[ -f "$RSA_KEY" ] && exit 0
podman run --rm -v "$CONFIG_DIR:/out:Z" docker.io/authelia/authelia:4.39 \
  authelia crypto pair rsa generate --directory /out >/dev/null 2>&1 || { echo "Warning: failed to generate RSA key for OIDC"; exit 0; }
mv "$CONFIG_DIR/private.pem" "$RSA_KEY" 2>/dev/null || echo "Warning: failed to rename RSA key"
rm -f "$CONFIG_DIR/public.pem"
"""

[integrations]
auth = []
smtp = false
