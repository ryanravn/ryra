# authelia tests — basic install + SMTP delivery via inbucket.

# Basic install: caddy (required for HTTPS) + authelia, then probe the
# health endpoint and assert the data dir is there.
[[tests]]
name = "authelia"
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.internal:8443"
env = { AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "http"
name = "health-check"
url = "http://127.0.0.1:$PORT_HTTP/api/health"
service = "authelia"
poll = { interval = 2, attempts = 15 }
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/services/authelia"

# SMTP: install with --smtp=inbucket, trigger a password-reset email,
# poll inbucket until the mail arrives for the admin account.
[[tests]]
name = "smtp"
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.internal:8443 --smtp=inbucket"
env = { AUTHELIA_ADMIN_USER = "smtptest", AUTHELIA_ADMIN_PASSWORD = "Testing-Smtp-123!", AUTHELIA_ADMIN_EMAIL = "smtptest@example.com" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "http"
name = "authelia-responds"
url = "https://auth.internal:8443/api/health"
service = "authelia"
poll = { interval = 2, attempts = 30 }
timeout = 90
[[tests.steps]]
action = "http"
name = "trigger-password-reset"
method = "post"
url = "https://auth.internal:8443/api/reset-password/identity/start"
body = '{"username":"smtptest"}'
timeout = 30
[[tests.steps]]
action = "mail"
name = "mail-delivered-to-inbucket"
mailbox = "smtptest"
timeout = 90
