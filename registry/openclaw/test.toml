# openclaw tests — install only.

[[tests]]
name = "openclaw"
[[tests.steps]]
action = "add"
service = "openclaw"
[[tests.steps]]
action = "wait"
service = "openclaw"
[[tests.steps]]
action = "http"
name = "http-responds"
url = "http://127.0.0.1:$PORT_GATEWAY"
service = "openclaw"
poll = { interval = 2, attempts = 30 }
timeout = 90
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/services/openclaw"
