[[steps]]
action = "add"
service = "openclaw"

[[steps]]
action = "wait"
service = "openclaw"

[[steps]]
action = "http"
name = "http-responds"
url = "http://127.0.0.1:$RYRA_PORT_GATEWAY"
service = "openclaw"
poll = { interval = 2, attempts = 30 }
timeout = 90

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/openclaw"
