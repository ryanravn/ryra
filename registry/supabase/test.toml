[setup]
services = ["supabase"]

[[tests]]
name = "api-ready"
run = "for i in $(seq 1 60); do curl -so /dev/null -w '%{http_code}' http://localhost:$RYRA_PORT_HTTP/ | grep -q '[0-9]' && exit 0; sleep 2; done; exit 1"
timeout = 150

[[tests]]
name = "auth-health"
run = "for i in $(seq 1 30); do curl -sf -H \"apikey: $ANON_KEY\" http://localhost:$RYRA_PORT_HTTP/auth/v1/health | grep -q GoTrue && exit 0; sleep 2; done; exit 1"
timeout = 90

[[tests]]
name = "signup-works"
run = "curl -sf -X POST -H \"apikey: $ANON_KEY\" -H \"Content-Type: application/json\" -d '{\"email\":\"e2e@test.local\",\"password\":\"testpassword123\"}' http://localhost:$RYRA_PORT_HTTP/auth/v1/signup | grep access_token"
timeout = 30

[[tests]]
name = "rest-responds"
run = "curl -sf -H \"apikey: $ANON_KEY\" -H \"Authorization: Bearer $ANON_KEY\" http://localhost:$RYRA_PORT_HTTP/rest/v1/"
timeout = 30
