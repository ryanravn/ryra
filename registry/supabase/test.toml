# supabase tests — basic install/API probes + SMTP via GoTrue recovery mail.

[[tests]]
name = "supabase"
[[tests.steps]]
action = "add"
service = "supabase"
[[tests.steps]]
action = "wait"
service = "supabase"
[[tests.steps]]
action = "shell"
name = "api-ready"
run = ". $HOME/.local/share/ryra/supabase/.env && for i in $(seq 1 60); do curl -so /dev/null -w '%{http_code}' http://localhost:$RYRA_PORT_HTTP/ | grep -q '[0-9]' && exit 0; sleep 2; done; exit 1"
timeout = 150
[[tests.steps]]
action = "shell"
name = "auth-health"
run = ". $HOME/.local/share/ryra/supabase/.env && for i in $(seq 1 30); do curl -sf -H \"apikey: $ANON_KEY\" http://localhost:$RYRA_PORT_HTTP/auth/v1/health | grep -q GoTrue && exit 0; sleep 2; done; exit 1"
timeout = 90
[[tests.steps]]
action = "shell"
name = "signup-works"
run = ". $HOME/.local/share/ryra/supabase/.env && curl -sf -X POST -H \"apikey: $ANON_KEY\" -H \"Content-Type: application/json\" -d '{\"email\":\"e2e@example.com\",\"password\":\"testpassword123\"}' http://localhost:$RYRA_PORT_HTTP/auth/v1/signup | grep access_token"
timeout = 30
[[tests.steps]]
action = "shell"
name = "rest-responds"
run = ". $HOME/.local/share/ryra/supabase/.env && curl -sf -H \"apikey: $ANON_KEY\" -H \"Authorization: Bearer $ANON_KEY\" http://localhost:$RYRA_PORT_HTTP/rest/v1/"
timeout = 30

# SMTP via GoTrue's recovery email endpoint. Heavy stack — requires ~4.5 GB
# RAM for postgres + kong + gotrue + rest + realtime + storage + studio + meta.
[[tests]]
name = "smtp"
ram = 4608
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "supabase"
args = "--smtp=inbucket"
timeout = 1200
[[tests.steps]]
action = "wait"
service = "supabase"
[[tests.steps]]
action = "http"
name = "supabase-auth-healthy"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/auth/v1/health"
service = "supabase"
headers = { apikey = "$ANON_KEY" }
poll = { interval = 5, attempts = 72 }
timeout = 420
[[tests.steps]]
action = "http"
name = "create-user"
method = "post"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/auth/v1/signup"
service = "supabase"
headers = { apikey = "$ANON_KEY" }
body = '{"email":"smtptest@example.com","password":"Testing-Smtp-123!"}'
timeout = 30
[[tests.steps]]
action = "http"
name = "trigger-recovery-email"
method = "post"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/auth/v1/recover"
service = "supabase"
headers = { apikey = "$ANON_KEY" }
body = '{"email":"smtptest@example.com"}'
timeout = 30
[[tests.steps]]
action = "mail"
name = "mail-delivered-to-inbucket"
mailbox = "smtptest"
poll = { interval = 2, attempts = 45 }
timeout = 120
