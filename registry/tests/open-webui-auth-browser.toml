[test]
name = "open-webui-auth-browser"
browser = true
ram = 2048

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia
[[steps]]
action = "run"
name = "add-authelia"
run = """AUTHELIA_ADMIN_USER=testuser AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --url https://auth.test.local:8443"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install open-webui with OIDC auth
[[steps]]
action = "run"
name = "add-open-webui"
run = """OLLAMA_BASE_URL= \
ryra add open-webui --auth"""
timeout = 600

[[steps]]
action = "wait"
service = "open-webui"

# The browser (Playwright) needs /etc/hosts to resolve .test.local domains
[[steps]]
action = "run"
name = "setup-hosts"
run = "echo '127.0.0.1 auth.test.local' >> /etc/hosts"

# Wait for open-webui to respond
[[steps]]
action = "assert"
name = "open-webui-responds"
run = "for i in $(seq 1 30); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/open-webui/.env | cut -d= -f2) | grep -qE '^(200|302)' && exit 0; sleep 2; done; exit 1"
timeout = 90

# Run playwright SSO tests
[[steps]]
action = "assert"
name = "playwright-auth-flow"
run = """
export PATH="$HOME/.bun/bin:$PATH"
export OPEN_WEBUI_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/open-webui/.env | cut -d= -f2)
export AUTHELIA_USER=testuser
export AUTHELIA_PASSWORD=testpassword123
cd /opt/ryra-test-registry/tests/browser
ln -sf /opt/playwright/node_modules .
bunx playwright test open-webui-auth.spec.ts --reporter=list
"""
timeout = 120
