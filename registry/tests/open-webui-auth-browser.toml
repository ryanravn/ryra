[test]
name = "open-webui-auth-browser"
browser = true
ram = 2048

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "shell"
name = "add-authelia"
run = """AUTHELIA_ADMIN_USER=testuser AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --url https://auth.localhost:8443"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install open-webui with OIDC auth
[[steps]]
action = "shell"
name = "add-open-webui"
run = """OLLAMA_BASE_URL= \
ryra add open-webui --auth"""
timeout = 600

[[steps]]
action = "wait"
service = "open-webui"

# Wait for open-webui to respond
[[steps]]
action = "shell"
name = "open-webui-responds"
run = "for i in $(seq 1 30); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/open-webui/.env | cut -d= -f2) | grep -qE '^(200|302)' && exit 0; sleep 2; done; exit 1"
timeout = 90

# Run playwright SSO tests
[[steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "open-webui-auth.spec.ts"
timeout = 180
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
