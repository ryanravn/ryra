[test]
name = "open-webui-auth-browser"
browser = true
ram = 2048

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia
[[steps]]
action = "run"
name = "add-authelia"
run = """AUTHELIA_ADMIN_USER=testuser AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --domain auth.test.local"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install open-webui with OIDC auth
[[steps]]
action = "run"
name = "add-open-webui"
run = """OLLAMA_BASE_URL= \
ryra add open-webui --auth --domain chat.test.local"""
timeout = 300

[[steps]]
action = "wait"
service = "open-webui"

# The browser (Playwright) needs /etc/hosts to resolve .test.local domains
[[steps]]
action = "run"
name = "setup-hosts"
run = "echo '127.0.0.1 auth.test.local chat.test.local' >> /etc/hosts"

# Wait for open-webui to respond via Caddy
[[steps]]
action = "assert"
name = "open-webui-via-caddy"
run = "for i in $(seq 1 30); do curl -sk -o /dev/null -w '%{http_code}' --resolve chat.test.local:8443:127.0.0.1 https://chat.test.local:8443 | grep -qE '^(200|302)' && exit 0; sleep 2; done; exit 1"
timeout = 90

# Run playwright SSO tests
[[steps]]
action = "assert"
name = "playwright-auth-flow"
run = """
export PATH="$HOME/.bun/bin:$PATH"
export AUTHELIA_USER=testuser
export AUTHELIA_PASSWORD=testpassword123
cd /opt/ryra-test-registry/tests/browser
ln -sf /opt/playwright/node_modules .
bunx playwright test open-webui-auth.spec.ts --reporter=list
"""
timeout = 120
