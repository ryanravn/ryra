[test]
name = "open-webui-auth-browser"
browser = true
ram = 2048

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install open-webui with OIDC auth
[[steps]]
action = "add"
service = "open-webui"
args = "--auth"
env = { OLLAMA_BASE_URL = "" }
timeout = 600

[[steps]]
action = "wait"
service = "open-webui"

# Wait for open-webui to respond
[[steps]]
action = "http"
name = "open-webui-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "open-webui"
poll = { interval = 2, attempts = 30 }
timeout = 90

# Run playwright SSO tests
[[steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "open-webui-auth.spec.ts"
timeout = 180
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
