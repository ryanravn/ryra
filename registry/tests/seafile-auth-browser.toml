[test]
name = "seafile-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia
[[steps]]
action = "run"
name = "add-authelia"
run = """AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --domain auth.test.local --repo /opt/ryra-test-registry"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install seafile with OIDC auth
[[steps]]
action = "run"
name = "add-seafile"
run = """INIT_SEAFILE_ADMIN_EMAIL=admin@test.local \
INIT_SEAFILE_ADMIN_PASSWORD=testpassword123 \
ryra add seafile --auth --domain seafile.test.local --repo /opt/ryra-test-registry"""
timeout = 900

[[steps]]
action = "wait"
service = "seafile"

# The browser (Playwright on the host) needs /etc/hosts to resolve .test.local domains.
[[steps]]
action = "run"
name = "setup-hosts"
run = "echo '127.0.0.1 auth.test.local seafile.test.local' >> /etc/hosts"

# Wait for seafile HTTP
[[steps]]
action = "assert"
name = "seafile-http-ready"
run = "for i in $(seq 1 60); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/seafile/.env | cut -d= -f2) 2>/dev/null | grep -qE '^(200|301|302)' && exit 0; sleep 5; done; exit 1"
timeout = 360

# Run playwright SSO tests
[[steps]]
action = "assert"
name = "playwright-sso-tests"
run = """
export PATH="$HOME/.bun/bin:$PATH"
export SEAFILE_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/seafile/.env | cut -d= -f2)
cd /opt/ryra-test-registry/tests/browser
ln -sf /opt/playwright/node_modules .
bunx playwright test seafile-auth.spec.ts --reporter=list
"""
timeout = 120
