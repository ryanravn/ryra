[test]
name = "seafile-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "run"
name = "add-authelia"
run = """AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --url https://auth.localhost:8443"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install seafile with OIDC auth and .localhost domain
[[steps]]
action = "run"
name = "add-seafile"
run = """INIT_SEAFILE_ADMIN_EMAIL=admin@test.local \
INIT_SEAFILE_ADMIN_PASSWORD=testpassword123 \
ryra add seafile --auth --url https://seafile.localhost:8443"""
timeout = 900

[[steps]]
action = "wait"
service = "seafile"

# Wait for seafile HTTP via Caddy
[[steps]]
action = "assert"
name = "seafile-http-ready"
run = "for i in $(seq 1 60); do curl -kso /dev/null -w '%{http_code}' https://seafile.localhost:8443 2>/dev/null | grep -qE '^(200|301|302)' && exit 0; sleep 5; done; exit 1"
timeout = 360

# Run playwright SSO tests
[[steps]]
action = "browser"
name = "playwright-sso"
spec = "seafile-auth.spec.ts"
timeout = 120
env = { SEAFILE_DOMAIN = "seafile.localhost:8443", AUTHELIA_PASSWORD = "testpassword123" }
