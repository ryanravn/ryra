[test]
name = "seafile-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install seafile with OIDC auth and .localhost domain
[[steps]]
action = "add"
service = "seafile"
args = "--auth --url https://seafile.localhost:8443"
env = { INIT_SEAFILE_ADMIN_EMAIL = "admin@test.local", INIT_SEAFILE_ADMIN_PASSWORD = "testpassword123" }
timeout = 900

[[steps]]
action = "wait"
service = "seafile"

# Wait for seafile HTTP via Caddy
[[steps]]
action = "http"
name = "seafile-http-ready"
url = "https://seafile.localhost:8443"
poll = { interval = 5, attempts = 60 }
timeout = 360

# Run playwright SSO tests
[[steps]]
action = "playwright"
name = "playwright-sso"
spec = "seafile-auth.spec.ts"
timeout = 120
env = { SEAFILE_DOMAIN = "seafile.localhost:8443", AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
