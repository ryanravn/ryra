[test]
name = "vikunja-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install vikunja with OIDC auth
[[steps]]
action = "add"
service = "vikunja"
args = "--auth"
timeout = 300

[[steps]]
action = "wait"
service = "vikunja"

# Wait for vikunja to respond
[[steps]]
action = "http"
name = "vikunja-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "vikunja"
poll = { interval = 2, attempts = 20 }
timeout = 60

# Run playwright SSO test
[[steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "vikunja-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
