[test]
name = "vikunja-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "shell"
name = "add-authelia"
run = """AUTHELIA_ADMIN_USER=testuser AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --url https://auth.localhost:8443"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install vikunja with OIDC auth
[[steps]]
action = "shell"
name = "add-vikunja"
run = "ryra add vikunja --auth"
timeout = 300

[[steps]]
action = "wait"
service = "vikunja"

# Wait for vikunja to respond
[[steps]]
action = "shell"
name = "vikunja-responds"
run = "for i in $(seq 1 20); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/vikunja/.env | cut -d= -f2) | grep -qE '^(200|302)' && exit 0; sleep 2; done; exit 1"
timeout = 60

# Run playwright SSO test
[[steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "vikunja-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
