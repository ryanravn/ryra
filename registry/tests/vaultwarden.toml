[test]
name = "vaultwarden-lifecycle"

# Vaultwarden requires HTTPS — install caddy first
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Inject fake SMTP config so vaultwarden's SMTP mappings render
[[steps]]
action = "shell"
name = "inject-smtp-config"
run = '''cat >> $HOME/.config/ryra/ryra.toml <<'TOML'

[smtp]
host = "localhost"
port = 1025
username = "test"
password = "test"
from = "noreply@test.local"
TOML'''

[[steps]]
action = "add"
service = "vaultwarden"
args = "--url https://vault.localhost:8443"

[[steps]]
action = "wait"
service = "vaultwarden"

[[steps]]
action = "http"
name = "http-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "vaultwarden"
poll = { interval = 2, attempts = 10 }

[[steps]]
action = "http"
name = "alive-endpoint"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/alive"
service = "vaultwarden"

[[steps]]
action = "shell"
name = "data-dir-exists"
run = "test -d $HOME/.local/share/ryra/vaultwarden"

# Verify SMTP env vars were rendered correctly from the mappings
[[steps]]
action = "shell"
name = "smtp-host-rendered"
run = "grep -q 'SMTP_HOST=localhost' $HOME/.local/share/ryra/vaultwarden/.env"

[[steps]]
action = "shell"
name = "smtp-from-rendered"
run = "grep -q 'SMTP_FROM=noreply@test.local' $HOME/.local/share/ryra/vaultwarden/.env"
