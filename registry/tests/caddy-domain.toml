[test]
name = "caddy-domain"
services = ["caddy", "whoami"]

# Install Caddy (user quadlet — creates empty Caddyfile automatically)
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install whoami with a domain — should add a Caddy route
[[steps]]
action = "run"
name = "add-whoami-with-domain"
run = "ryra add whoami --domain whoami.test.local --repo /opt/ryra-test-registry"

[[steps]]
action = "wait"
service = "whoami"

# Verify the Caddyfile has the whoami route
[[steps]]
action = "assert"
name = "caddyfile-has-whoami"
run = "grep -q 'ryra:whoami' $HOME/.local/share/ryra/caddy/config/Caddyfile"

[[steps]]
action = "assert"
name = "caddyfile-has-domain"
run = "grep -q 'whoami.test.local' $HOME/.local/share/ryra/caddy/config/Caddyfile"

[[steps]]
action = "assert"
name = "caddyfile-has-reverse-proxy"
run = "grep -q 'reverse_proxy' $HOME/.local/share/ryra/caddy/config/Caddyfile"

# Remove whoami — should clean up Caddy route
[[steps]]
action = "run"
name = "remove-whoami"
run = "ryra remove whoami -y"

[[steps]]
action = "assert"
name = "caddyfile-cleaned"
run = "! grep -q 'ryra:whoami' $HOME/.local/share/ryra/caddy/config/Caddyfile"
