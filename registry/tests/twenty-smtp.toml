[test]
name = "twenty-smtp"
browser = true

[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Twenty is a multi-container stack (server + worker + postgres + redis) and
# the image is heavy. Budget ~10 min for cold-boot image pulls.
[[steps]]
action = "add"
service = "twenty"
args = "--smtp=inbucket --url https://twenty.localhost:8443"
timeout = 900

[[steps]]
action = "wait"
service = "twenty"

# Twenty's web UI responds.
[[steps]]
action = "http"
name = "twenty-responds"
url = "https://twenty.localhost:8443/healthz"
service = "twenty"
poll = { interval = 3, attempts = 40 }
timeout = 180

# Walk the onboarding UI and click Finish on the invite step. The
# spec itself only asserts we reached the post-onboarding app; the real
# SMTP assertion is the inbucket poll below.
[[steps]]
action = "playwright"
name = "onboarding-invite-flow"
spec = "twenty-smtp.spec.ts"
timeout = 180
env = { TWENTY_URL = "https://twenty.localhost:8443", INVITE_EMAIL = "smtptest@ryra.local" }

# The invite email is sent async through bullmq → twenty-worker → SMTP.
# Generous poll to tolerate queue scheduling jitter.
[[steps]]
action = "shell"
name = "mail-delivered-to-inbucket"
run = """INBUCKET_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/inbucket/.env | cut -d= -f2)
for i in $(seq 1 45); do
  BODY=$(curl -sf http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest 2>/dev/null)
  if [ -n "$BODY" ] && [ "$BODY" != "[]" ]; then
    echo "$BODY" | grep -qi 'twenty\\|join' && exit 0
  fi
  sleep 2
done
echo "no mail for smtptest@ryra.local after 90s"
curl -sf "http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest" || true
exit 1"""
timeout = 120
