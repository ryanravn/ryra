[test]
name = "forgejo-smtp"

# Install caddy first — ryra puts inbucket + any SMTP-using service on the
# caddy network so they can resolve each other by container name. Without
# caddy, the forgejo container can't reach `inbucket:2500`.
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install forgejo with --smtp=inbucket. This also auto-installs inbucket and
# wires ryra's global config.smtp to point at it, so forgejo's [mappings.smtp]
# template resolves to working values in its .env.
[[steps]]
action = "add"
service = "forgejo"
args = "--smtp=inbucket"
timeout = 300

[[steps]]
action = "wait"
service = "forgejo"

# Forgejo HTTP responds — gate subsequent CLI calls on the web UI coming up,
# which implies migrations + the initial admin user are in place.
[[steps]]
action = "http"
name = "forgejo-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "forgejo"
poll = { interval = 2, attempts = 30 }
timeout = 90

# Create a user inside forgejo with a known email. `admin sendmail` emails
# every user on the instance — no per-recipient flag — so we just need one
# predictable inbox to check afterwards. Loop covers startup races where
# migrations are still running.
[[steps]]
action = "shell"
name = "create-mail-target-user"
run = """for i in $(seq 1 15); do
  podman exec -u git forgejo forgejo admin user create \
    --username smtptest \
    --email smtptest@ryra.local \
    --password 'Testing-Smtp-123!' \
    --must-change-password=false && exit 0
  sleep 2
done
exit 1"""
timeout = 40

# Trigger an email via forgejo's built-in admin sendmail CLI. It broadcasts
# to every user; --force skips the "send to N users?" confirmation.
[[steps]]
action = "shell"
name = "trigger-smtp-mail"
run = """podman exec -u git forgejo forgejo admin sendmail \
  --title 'ryra smtp test' \
  --content 'delivered through inbucket' \
  --force"""
timeout = 30

# Poll inbucket's HTTP API until the mail lands. Mailbox name is the local
# part of the recipient address ("smtptest"). Success condition: inbucket
# returns a non-empty JSON array.
[[steps]]
action = "shell"
name = "mail-delivered-to-inbucket"
run = """INBUCKET_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/inbucket/.env | cut -d= -f2)
for i in $(seq 1 30); do
  BODY=$(curl -sf http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest 2>/dev/null)
  if [ -n "$BODY" ] && [ "$BODY" != "[]" ]; then
    echo "$BODY" | grep -q 'ryra smtp test' && exit 0
  fi
  sleep 2
done
echo "no mail for smtptest@ryra.local after 60s"
curl -sf "http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest" || true
exit 1"""
timeout = 90
