# End-to-end lifecycle test for `ryra rm` (data-preserving) and
# `ryra rm --purge` (destructive), covering both installed and orphan
# states via the unified `ryra ls` view.

[test]
name = "data-lifecycle"

[[steps]]
action = "add"
service = "vikunja"
timeout = 300

[[steps]]
action = "wait"
service = "vikunja"
timeout = 120

# After add, `ryra ls` must report vikunja as installed.
[[steps]]
action = "shell"
name = "installed-shows-in-ls"
run = "ryra ls | grep -E '^vikunja\\s+installed'"
timeout = 30

# Data-preserving rm (no --purge): service home dir and podman
# volumes must both survive.
[[steps]]
action = "shell"
name = "rm-preserves-data"
run = """set -e
ryra rm vikunja -y
test -d ~/.local/share/ryra/vikunja
# .env must be gone (ephemeral)
! test -f ~/.local/share/ryra/vikunja/.env
# The podman volumes must still exist
podman volume exists systemd-vikunja-db
podman volume exists systemd-vikunja-files
"""
timeout = 60

# After rm (without --purge), `ryra ls` must now report vikunja as orphan.
[[steps]]
action = "shell"
name = "orphan-shows-in-ls"
run = "ryra ls | grep -E '^vikunja\\s+orphan'"
timeout = 30

# `ryra rm vikunja --purge -y` on an orphan must wipe home dir + volumes.
[[steps]]
action = "shell"
name = "purge-cleans-up"
run = """set -e
ryra rm vikunja --purge -y
! test -d ~/.local/share/ryra/vikunja
! podman volume exists systemd-vikunja-db
! podman volume exists systemd-vikunja-files
"""
timeout = 60

# After the purge, vikunja must not appear in `ryra ls` at all.
[[steps]]
action = "shell"
name = "ls-no-vikunja-after-purge"
run = "! ryra ls | grep -E '^vikunja\\s'"
timeout = 30
