# End-to-end lifecycle test for `ryra remove` (data-preserving) and
# `ryra remove --purge` (destructive), covering both installed and orphan
# states via the unified `ryra list` view.

[test]
name = "data-lifecycle"

[[steps]]
action = "add"
service = "vikunja"
timeout = 300

[[steps]]
action = "wait"
service = "vikunja"
timeout = 120

# After add, `ryra list -a` must report vikunja with a live status.
# `ryra list -a` shows "running" (installed + systemd active) or
# "stopped" (installed + inactive); we accept either since the wait step
# above only verifies the unit reached `active`, not that the container
# is still running by the time we grep.
[[steps]]
action = "shell"
name = "installed-shows-in-list"
run = "ryra list -a | grep -E '^vikunja\\s+(running|stopped)'"
timeout = 30

# Data-preserving remove (no --purge): service home dir and podman
# volumes must both survive.
[[steps]]
action = "shell"
name = "remove-preserves-data"
run = """set -e
ryra remove vikunja -y
test -d ~/services/vikunja
# .env must be gone (ephemeral)
! test -f ~/services/vikunja/.env
# The podman volumes must still exist
podman volume exists systemd-vikunja-db
podman volume exists systemd-vikunja-files
"""
timeout = 60

# After remove (without --purge), `ryra list -a` must now report vikunja
# as removed (data preserved, no longer installed).
[[steps]]
action = "shell"
name = "orphan-shows-in-list"
run = "ryra list -a | grep -E '^vikunja\\s+removed'"
timeout = 30

# `ryra remove vikunja --purge -y` on an orphan must wipe home dir +
# volumes.
[[steps]]
action = "shell"
name = "purge-cleans-up"
run = """set -e
ryra remove vikunja --purge -y
! test -d ~/services/vikunja
! podman volume exists systemd-vikunja-db
! podman volume exists systemd-vikunja-files
"""
timeout = 60

# After the purge, vikunja must not appear in `ryra list` at all.
[[steps]]
action = "shell"
name = "list-no-vikunja-after-purge"
run = "! ryra list -a | grep -E '^vikunja\\s'"
timeout = 30
