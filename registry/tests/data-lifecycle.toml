# End-to-end lifecycle test for `ryra rm` (data-preserving) +
# `ryra data ls` + `ryra data rm`.

[test]
name = "data-lifecycle"

[[steps]]
action = "add"
service = "vikunja"

[[steps]]
action = "wait"
service = "vikunja"

# After add, `ryra data ls` must report vikunja as installed.
[[steps]]
action = "shell"
name = "installed-shows-in-data-ls"
run = "ryra data ls | grep -E '^vikunja\\s+installed'"
timeout = 30

# Data-preserving rm (no --purge): service home dir and podman
# volume must both survive.
[[steps]]
action = "shell"
name = "rm-preserves-data"
run = """set -e
ryra rm vikunja -y
test -d ~/.local/share/ryra/vikunja
# .env must be gone (ephemeral)
! test -f ~/.local/share/ryra/vikunja/.env
# The podman volume must still exist
podman volume ls --format '{{.Name}}' | grep -q '^systemd-vikunja-db$'
"""
timeout = 60

# After rm (without --purge), ls must now report vikunja as orphan.
[[steps]]
action = "shell"
name = "orphan-shows-in-data-ls"
run = "ryra data ls | grep -E '^vikunja\\s+orphan'"
timeout = 30

# `ryra data rm vikunja -y` must wipe both the home dir and the volume.
[[steps]]
action = "shell"
name = "data-rm-cleans-up"
run = """set -e
ryra data rm vikunja -y
! test -d ~/.local/share/ryra/vikunja
! podman volume ls --format '{{.Name}}' | grep -q '^systemd-vikunja-db$'
"""
timeout = 60
