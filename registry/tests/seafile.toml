[test]
name = "seafile"

# Seafile requires HTTPS — install caddy first
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

[[steps]]
action = "add"
service = "seafile"
args = "--url https://seafile.localhost:8443"
env = { INIT_SEAFILE_ADMIN_EMAIL = "admin@test.local", INIT_SEAFILE_ADMIN_PASSWORD = "testpassword123" }

[[steps]]
action = "wait"
service = "seafile"

[[steps]]
action = "http"
name = "seafile-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "seafile"
poll = { interval = 5, attempts = 180 }
timeout = 960

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/seafile"
