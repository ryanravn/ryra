[test]
name = "idempotent-init"

# Init is already run by the lifecycle runner. Run it again and verify config is preserved.
[[steps]]
action = "shell"
name = "config-exists-after-first-init"
run = "test -f $HOME/.config/ryra/ryra.toml"

[[steps]]
action = "shell"
name = "second-init"
run = "ryra init"
timeout = 30

[[steps]]
action = "shell"
name = "config-still-exists"
run = "test -f $HOME/.config/ryra/ryra.toml"

# Add a service, then init again — service and config should be preserved
[[steps]]
action = "add"
service = "whoami"

[[steps]]
action = "wait"
service = "whoami"

[[steps]]
action = "shell"
name = "third-init"
run = "ryra init"
timeout = 30

[[steps]]
action = "shell"
name = "whoami-still-running"
run = "systemctl --user is-active whoami.service"

[[steps]]
action = "shell"
name = "config-has-whoami"
run = "grep -q whoami $HOME/.config/ryra/ryra.toml"
