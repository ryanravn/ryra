[test]
name = "authentik-oidc-blueprint"

# Install authentik
[[steps]]
action = "run"
name = "add-authentik"
run = """AUTHENTIK_BOOTSTRAP_EMAIL=admin@test.local \
AUTHENTIK_BOOTSTRAP_PASSWORD=testpassword123 \
ryra add authentik --repo /opt/ryra-test-registry"""
timeout = 300

[[steps]]
action = "wait"
service = "authentik"

# Verify auth config was auto-populated in ryra.toml
[[steps]]
action = "assert"
name = "auth-config-populated"
run = "grep -q 'provider = \"authentik\"' $HOME/.config/ryra/ryra.toml"

[[steps]]
action = "assert"
name = "auth-token-populated"
run = "grep -q 'api_token' $HOME/.config/ryra/ryra.toml"

# Install whoami-auth — supports oidc, should auto-enable and register via API
[[steps]]
action = "add"
service = "whoami-auth"

[[steps]]
action = "wait"
service = "whoami-auth"

# Verify whoami-auth's .env got the OIDC env vars from mappings.auth
[[steps]]
action = "assert"
name = "oidc-client-id-in-env"
run = "grep -q 'OIDC_CLIENT_ID=' $HOME/.local/share/ryra/whoami-auth/.env"

[[steps]]
action = "assert"
name = "oidc-issuer-in-env"
run = "grep -q 'OIDC_ISSUER=.*application/o/whoami-auth' $HOME/.local/share/ryra/whoami-auth/.env"

# Verify the OAuth provider was registered in authentik via API
[[steps]]
action = "assert"
name = "oauth-provider-registered"
run = """
TOKEN=$(grep api_token $HOME/.config/ryra/ryra.toml | sed 's/.*= "\\(.*\\)"/\\1/')
curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:9000/api/v3/providers/oauth2/?name=whoami-auth | grep -q '"name":"whoami-auth"'
"""
timeout = 30

# Remove whoami-auth
[[steps]]
action = "remove"
service = "whoami-auth"
