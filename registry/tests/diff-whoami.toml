[test]
name = "diff-whoami"

# Add whoami, verify snapshot was saved, then diff shows no changes
[[steps]]
action = "add"
service = "whoami"

[[steps]]
action = "wait"
service = "whoami"

[[steps]]
action = "assert"
name = "snapshot-saved"
run = "test -f $HOME/.config/ryra/snapshots/whoami.toml"

[[steps]]
action = "assert"
name = "diff-no-changes"
run = "ryra diff whoami 2>&1 | grep -q 'up to date'"

# Modify the extracted bundled registry to simulate an upstream change.
# The bundled registry is extracted to ~/.cache/ryra/bundled/ on first use
# and won't be re-extracted until the binary version changes.
[[steps]]
action = "run"
name = "simulate-upstream-change"
run = """cat >> $HOME/.cache/ryra/bundled/whoami/service.toml <<'TOML'

[[env]]
name = "NEW_VAR"
value = "hello"
TOML"""

[[steps]]
action = "assert"
name = "diff-shows-change"
run = "ryra diff whoami 2>&1 | grep -q 'env var added: NEW_VAR'"

# Remove and verify snapshot is cleaned up
[[steps]]
action = "remove"
service = "whoami"

[[steps]]
action = "assert"
name = "snapshot-removed"
run = "test ! -f $HOME/.config/ryra/snapshots/whoami.toml"
