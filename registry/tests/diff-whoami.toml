[test]
name = "diff-whoami"

# Add whoami, verify snapshot was saved, then diff shows no changes
[[steps]]
action = "add"
service = "whoami"

[[steps]]
action = "wait"
service = "whoami"

[[steps]]
action = "assert"
name = "snapshot-saved"
run = "test -f /etc/ryra/snapshots/whoami.toml"

[[steps]]
action = "assert"
name = "diff-no-changes"
run = "ryra diff whoami --repo /opt/ryra-test-registry 2>&1 | grep -q 'up to date'"

# Modify the registry service.toml to simulate an upstream change
[[steps]]
action = "run"
name = "simulate-upstream-change"
run = """cat >> /opt/ryra-test-registry/whoami/service.toml <<'TOML'

[[env]]
name = "NEW_VAR"
value = "hello"
TOML"""

[[steps]]
action = "assert"
name = "diff-shows-change"
run = "ryra diff whoami --repo /opt/ryra-test-registry 2>&1 | grep -q 'env var added: NEW_VAR'"

# Remove and verify snapshot is cleaned up
[[steps]]
action = "remove"
service = "whoami"

[[steps]]
action = "assert"
name = "snapshot-removed"
run = "test ! -f /etc/ryra/snapshots/whoami.toml"
