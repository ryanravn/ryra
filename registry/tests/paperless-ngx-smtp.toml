[test]
name = "paperless-ngx-smtp"

[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

[[steps]]
action = "add"
service = "paperless-ngx"
args = "--smtp=inbucket"
timeout = 600

[[steps]]
action = "wait"
service = "paperless-ngx"

[[steps]]
action = "http"
name = "paperless-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "paperless-ngx"
poll = { interval = 2, attempts = 45 }
timeout = 180

# Django ships `sendtestemail` as a management command — perfect single-call
# trigger that uses the app's actual SMTP config and skips all app-specific
# auth/CSRF logic.
[[steps]]
action = "shell"
name = "trigger-smtp-mail"
run = """for i in $(seq 1 10); do
  podman exec paperless-ngx python manage.py sendtestemail smtptest@ryra.local && exit 0
  sleep 3
done
exit 1"""
timeout = 60

[[steps]]
action = "shell"
name = "mail-delivered-to-inbucket"
run = """INBUCKET_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/inbucket/.env | cut -d= -f2)
for i in $(seq 1 30); do
  BODY=$(curl -sf http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest 2>/dev/null)
  if [ -n "$BODY" ] && [ "$BODY" != "[]" ]; then
    exit 0
  fi
  sleep 2
done
echo "no mail for smtptest@ryra.local after 60s"
curl -sf "http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest" || true
exit 1"""
timeout = 90
