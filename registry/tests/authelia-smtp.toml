[test]
name = "authelia-smtp"

# Caddy first — authelia requires HTTPS for its issuer URL, and inbucket
# joins the caddy network for container-name DNS.
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Authelia with --smtp=inbucket — auto-installs inbucket and wires SMTP.
# AUTHELIA_ADMIN_EMAIL controls the admin user's email, which is what
# password-reset mail gets addressed to below.
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443 --smtp=inbucket"
env = { AUTHELIA_ADMIN_USER = "smtptest", AUTHELIA_ADMIN_PASSWORD = "Testing-Smtp-123!", AUTHELIA_ADMIN_EMAIL = "smtptest@ryra.local" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Authelia reachable through caddy.
[[steps]]
action = "http"
name = "authelia-responds"
url = "https://auth.localhost:8443/api/health"
service = "authelia"
poll = { interval = 2, attempts = 30 }
timeout = 90

# Trigger a password-reset email. Authelia sends the reset link to the
# email on file for the given username. The endpoint accepts the request
# (200) even if the user doesn't exist to avoid account enumeration.
[[steps]]
action = "http"
name = "trigger-password-reset"
method = "post"
url = "https://auth.localhost:8443/api/reset-password/identity/start"
body = '{"username":"smtptest"}'
timeout = 30

# Poll inbucket for the reset mail.
[[steps]]
action = "shell"
name = "mail-delivered-to-inbucket"
run = """INBUCKET_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/inbucket/.env | cut -d= -f2)
for i in $(seq 1 30); do
  BODY=$(curl -sf http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest 2>/dev/null)
  if [ -n "$BODY" ] && [ "$BODY" != "[]" ]; then
    exit 0
  fi
  sleep 2
done
echo "no mail for smtptest@ryra.local after 60s"
curl -sf "http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest" || true
exit 1"""
timeout = 90
