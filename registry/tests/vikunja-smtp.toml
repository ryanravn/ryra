[test]
name = "vikunja-smtp"

# Caddy first — inbucket + SMTP-using services share the caddy network for
# container-name DNS resolution.
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

[[steps]]
action = "add"
service = "vikunja"
args = "--smtp=inbucket"
timeout = 300

[[steps]]
action = "wait"
service = "vikunja"

[[steps]]
action = "http"
name = "vikunja-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "vikunja"
poll = { interval = 2, attempts = 30 }
timeout = 90

# Register a new user. Vikunja's mailer (enabled when SMTP is configured)
# sends a confirmation email on successful registration.
[[steps]]
action = "http"
name = "trigger-signup-email"
method = "post"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/api/v1/register"
service = "vikunja"
body = '{"username":"smtptest","email":"smtptest@ryra.local","password":"Testing-Smtp-123!"}'
timeout = 30

# Poll inbucket until the confirmation mail lands in the smtptest mailbox.
[[steps]]
action = "shell"
name = "mail-delivered-to-inbucket"
run = """INBUCKET_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/inbucket/.env | cut -d= -f2)
for i in $(seq 1 30); do
  BODY=$(curl -sf http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest 2>/dev/null)
  if [ -n "$BODY" ] && [ "$BODY" != "[]" ]; then
    exit 0
  fi
  sleep 2
done
echo "no mail for smtptest@ryra.local after 60s"
curl -sf "http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest" || true
exit 1"""
timeout = 90
