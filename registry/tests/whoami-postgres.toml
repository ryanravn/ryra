[test]
name = "whoami-plus-postgres"
services = ["whoami", "postgres"]

[[tests]]
name = "whoami-responds"
run = "curl -sf http://127.0.0.1:$WHOAMI__RYRA_PORT_HTTP"

[[tests]]
name = "postgres-accepts-connections"
run = "for i in $(seq 1 5); do PGPASSWORD=$POSTGRES__POSTGRES_PASSWORD psql -h 127.0.0.1 -p $POSTGRES__RYRA_PORT_TCP -U $POSTGRES__POSTGRES_USER -c 'SELECT 1' && exit 0; sleep 2; done; exit 1"
timeout = 60

[[tests]]
name = "both-services-active"
run = "systemctl --machine=whoami@ --user is-active whoami.service && systemctl --machine=postgres@ --user is-active postgres.service"
