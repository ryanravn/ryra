[test]
name = "whoami-postgres"

# Add services
[[steps]]
action = "add"
service = "whoami"

[[steps]]
action = "add"
service = "postgres"

[[steps]]
action = "wait"
service = "whoami"

[[steps]]
action = "wait"
service = "postgres"

# Verify whoami responds
[[steps]]
action = "http"
name = "whoami-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "whoami"

# Verify postgres accepts connections
[[steps]]
action = "shell"
name = "postgres-accepts-connections"
run = ". $HOME/.local/share/ryra/postgres/.env && for i in $(seq 1 5); do PGPASSWORD=$POSTGRES_PASSWORD psql -h 127.0.0.1 -p $RYRA_PORT_TCP -U $POSTGRES_USER -c 'SELECT 1' && exit 0; sleep 2; done; exit 1"
timeout = 60

# Verify both services are active
[[steps]]
action = "shell"
name = "both-services-active"
run = "systemctl --user is-active whoami.service && systemctl --user is-active postgres.service"
