[test]
name = "reset"

# Add two services, then reset — verify everything is gone
[[steps]]
action = "add"
service = "whoami"

[[steps]]
action = "wait"
service = "whoami"

[[steps]]
action = "add"
service = "postgres"

[[steps]]
action = "wait"
service = "postgres"

[[steps]]
action = "assert"
name = "both-running"
run = "systemctl --machine=whoami@ --user is-active whoami.service && systemctl --machine=postgres@ --user is-active postgres.service"

[[steps]]
action = "reset"

[[steps]]
action = "assert"
name = "whoami-stopped"
run = "! systemctl --machine=whoami@ --user is-active whoami.service 2>/dev/null"

[[steps]]
action = "assert"
name = "postgres-stopped"
run = "! systemctl --machine=postgres@ --user is-active postgres.service 2>/dev/null"

[[steps]]
action = "assert"
name = "whoami-user-gone"
run = "! id whoami 2>/dev/null"

[[steps]]
action = "assert"
name = "postgres-user-gone"
run = "! id postgres 2>/dev/null"

[[steps]]
action = "assert"
name = "config-empty"
run = "! grep -q '\\[services\\.' /etc/ryra/ryra.toml 2>/dev/null || test ! -f /etc/ryra/ryra.toml"

[[steps]]
action = "assert"
name = "whoami-home-gone"
run = "test ! -d /var/lib/whoami"

[[steps]]
action = "assert"
name = "postgres-home-gone"
run = "test ! -d /var/lib/postgres"
