[test]
name = "reset"

# Add two services, then reset — verify everything is gone
[[steps]]
action = "add"
service = "whoami"

[[steps]]
action = "wait"
service = "whoami"

[[steps]]
action = "add"
service = "postgres"

[[steps]]
action = "wait"
service = "postgres"

[[steps]]
action = "shell"
name = "both-running"
run = "systemctl --user is-active whoami.service && systemctl --user is-active postgres.service"

[[steps]]
action = "reset"

[[steps]]
action = "shell"
name = "whoami-stopped"
run = "! systemctl --user is-active whoami.service 2>/dev/null"

[[steps]]
action = "shell"
name = "postgres-stopped"
run = "! systemctl --user is-active postgres.service 2>/dev/null"

[[steps]]
action = "shell"
name = "config-empty"
run = "! grep -q '\\[services\\.' $HOME/.config/ryra/ryra.toml 2>/dev/null || test ! -f $HOME/.config/ryra/ryra.toml"

[[steps]]
action = "shell"
name = "whoami-data-gone"
run = "test ! -d $HOME/.local/share/ryra/whoami"

[[steps]]
action = "shell"
name = "postgres-data-gone"
run = "test ! -d $HOME/.local/share/ryra/postgres"
