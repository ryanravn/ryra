[test]
name = "immich-oidc-lifecycle"

# Install caddy (needed for authelia HTTPS)
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia (OIDC provider)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.test.local:8443"
env = { AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install immich with OIDC auth
[[steps]]
action = "add"
service = "immich"
args = "--auth"
env = { INIT_IMMICH_ADMIN_EMAIL = "admin@test.local", INIT_IMMICH_ADMIN_PASSWORD = "testpassword123" }
timeout = 900

[[steps]]
action = "wait"
service = "immich"

# The browser (Playwright on the host) needs /etc/hosts to resolve .test.local domains.
[[steps]]
action = "shell"
name = "setup-hosts"
run = "echo '127.0.0.1 auth.test.local' >> /etc/hosts"

# Verify Immich responds
[[steps]]
action = "http"
name = "http-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/api/server/ping"
service = "immich"
poll = { interval = 5, attempts = 60 }
timeout = 360

# Verify OIDC was configured via Immich API
[[steps]]
action = "shell"
name = "oidc-configured"
run = """
PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/immich/.env | cut -d= -f2)
EMAIL=$(grep INIT_IMMICH_ADMIN_EMAIL $HOME/.local/share/ryra/immich/.env | cut -d= -f2)
PASS=$(grep INIT_IMMICH_ADMIN_PASSWORD $HOME/.local/share/ryra/immich/.env | cut -d= -f2)
python3 -c "
import json, urllib.request
url = 'http://127.0.0.1:' + '$PORT'
body = json.dumps({'email': '$EMAIL', 'password': '$PASS'}).encode()
req = urllib.request.Request(url + '/api/auth/login', data=body, headers={'Content-Type': 'application/json'})
token = json.loads(urllib.request.urlopen(req).read())['accessToken']
req2 = urllib.request.Request(url + '/api/system-config', headers={'Authorization': 'Bearer ' + token})
config = json.loads(urllib.request.urlopen(req2).read())
assert config['oauth']['enabled'] == True, 'OAuth not enabled'
assert config['oauth']['clientId'] != '', 'No client ID'
print('OIDC verified: enabled with client_id=' + config['oauth']['clientId'][:8] + '...')
"
"""
timeout = 30

# Cleanup
[[steps]]
action = "remove"
service = "immich"
