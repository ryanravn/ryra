[test]
name = "supabase-smtp"
# Heavy stack — postgres + kong + gotrue + rest + realtime + storage +
# studio + meta. Budget RAM and long timeouts for first-run image pulls
# + bootstrapping migrations.
ram = 4608

[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

[[steps]]
action = "add"
service = "supabase"
args = "--smtp=inbucket"
timeout = 1200

[[steps]]
action = "wait"
service = "supabase"

# Kong (the API gateway) can take 2-5 min to become healthy on a cold
# VM because it waits on postgres migrations + gotrue init. Supabase's
# Kong rejects every route with 401 unless an apikey is provided — the
# auth health endpoint with anon key is a legit "stack is up" probe.
[[steps]]
action = "http"
name = "supabase-auth-healthy"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/auth/v1/health"
service = "supabase"
headers = { apikey = "$ANON_KEY" }
poll = { interval = 5, attempts = 72 }
timeout = 420

# Signup creates the user. Supabase defaults to GOTRUE_MAILER_AUTOCONFIRM
# so no confirmation mail is sent — fine, we just need the account to exist
# so the next step (recover) has something to reset.
[[steps]]
action = "http"
name = "create-user"
method = "post"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/auth/v1/signup"
service = "supabase"
headers = { apikey = "$ANON_KEY" }
body = '{"email":"smtptest@ryra.local","password":"Testing-Smtp-123!"}'
timeout = 30

# Request password recovery — GoTrue always emails this regardless of
# autoconfirm, as long as the user exists and SMTP is wired.
[[steps]]
action = "http"
name = "trigger-recovery-email"
method = "post"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/auth/v1/recover"
service = "supabase"
headers = { apikey = "$ANON_KEY" }
body = '{"email":"smtptest@ryra.local"}'
timeout = 30

[[steps]]
action = "shell"
name = "mail-delivered-to-inbucket"
run = """INBUCKET_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/inbucket/.env | cut -d= -f2)
for i in $(seq 1 45); do
  BODY=$(curl -sf http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest 2>/dev/null)
  if [ -n "$BODY" ] && [ "$BODY" != "[]" ]; then
    exit 0
  fi
  sleep 2
done
echo "no mail for smtptest@ryra.local after 90s"
curl -sf "http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest" || true
exit 1"""
timeout = 120
