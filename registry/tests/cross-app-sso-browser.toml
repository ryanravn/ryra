[test]
name = "cross-app-sso-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia
[[steps]]
action = "run"
name = "add-authelia"
run = """AUTHELIA_ADMIN_USER=testuser AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --domain auth.test.local"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install forgejo with native OIDC
[[steps]]
action = "run"
name = "add-forgejo"
run = "ryra add forgejo --auth --domain git.test.local"
timeout = 600

[[steps]]
action = "wait"
service = "forgejo"

# Install whoami with forward auth (no native OIDC)
[[steps]]
action = "run"
name = "add-whoami"
run = "ryra add whoami --auth --domain whoami.test.local"

[[steps]]
action = "wait"
service = "whoami"

# The browser (Playwright on the host) needs /etc/hosts to resolve .test.local domains.
[[steps]]
action = "run"
name = "setup-hosts"
run = "echo '127.0.0.1 auth.test.local git.test.local whoami.test.local' >> /etc/hosts"

# Wait for forgejo to respond
[[steps]]
action = "assert"
name = "forgejo-ready"
run = "for i in $(seq 1 30); do curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/forgejo/.env | cut -d= -f2)/api/v1/settings/api >/dev/null 2>&1 && exit 0; sleep 2; done; exit 1"
timeout = 90

# Wait for authelia via caddy
[[steps]]
action = "assert"
name = "authelia-via-caddy"
run = "for i in $(seq 1 20); do curl -sk -o /dev/null -w '%{http_code}' --resolve auth.test.local:8443:127.0.0.1 https://auth.test.local:8443 | grep -qE '^(200|302)' && exit 0; sleep 2; done; exit 1"
timeout = 60

# Run playwright cross-app SSO tests
[[steps]]
action = "assert"
name = "playwright-cross-app-sso"
run = """
export PATH="$HOME/.bun/bin:$PATH"
export AUTHELIA_USER=testuser
export AUTHELIA_PASSWORD=testpassword123
cd /opt/ryra-test-registry/tests/browser
ln -sf /opt/playwright/node_modules .
bunx playwright test cross-app-sso.spec.ts --reporter=list
"""
timeout = 120
