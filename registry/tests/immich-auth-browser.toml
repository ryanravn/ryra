[test]
name = "immich-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install immich with OIDC auth
[[steps]]
action = "add"
service = "immich"
args = "--auth"
env = { INIT_IMMICH_ADMIN_EMAIL = "admin@test.local", INIT_IMMICH_ADMIN_PASSWORD = "testpassword123" }
timeout = 900

[[steps]]
action = "wait"
service = "immich"

# Wait for immich HTTP
[[steps]]
action = "http"
name = "immich-http-ready"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/api/server/ping"
service = "immich"
poll = { interval = 5, attempts = 60 }
timeout = 360

# Create admin user
[[steps]]
action = "shell"
name = "create-admin"
run = """
PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/immich/.env | cut -d= -f2)
curl -sf -X POST "http://127.0.0.1:$PORT/api/auth/admin-sign-up" \
  -H "Content-Type: application/json" \
  -d '{"email":"admin@test.local","password":"testpassword123","name":"Admin"}' \
  >/dev/null 2>&1 || true
"""

# Run playwright SSO tests
[[steps]]
action = "playwright"
name = "playwright-sso-tests"
spec = "immich-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
