[test]
name = "immich-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "shell"
name = "add-authelia"
run = """AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --url https://auth.localhost:8443"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Trust Caddy's self-signed CA so Immich's server-side OIDC token exchange
# works over HTTPS. Immich uses OAUTH_ISSUER_URL (external HTTPS) for both
# browser redirects and server-side token exchange.
[[steps]]
action = "shell"
name = "trust-caddy-ca"
run = """
podman exec caddy cat /data/caddy/pki/authorities/local/root.crt \
  > /usr/local/share/ca-certificates/ryra-caddy-ca.crt && \
update-ca-certificates
"""

# Install immich with OIDC auth
[[steps]]
action = "shell"
name = "add-immich"
run = """INIT_IMMICH_ADMIN_EMAIL=admin@test.local \
INIT_IMMICH_ADMIN_PASSWORD=testpassword123 \
ryra add immich --auth"""
timeout = 900

[[steps]]
action = "wait"
service = "immich"

# Wait for immich HTTP
[[steps]]
action = "shell"
name = "immich-http-ready"
run = "for i in $(seq 1 60); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/immich/.env | cut -d= -f2)/api/server/ping 2>/dev/null | grep -q '200' && exit 0; sleep 5; done; exit 1"
timeout = 360

# Create admin user
[[steps]]
action = "shell"
name = "create-admin"
run = """
PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/immich/.env | cut -d= -f2)
curl -sf -X POST "http://127.0.0.1:$PORT/api/auth/admin-sign-up" \
  -H "Content-Type: application/json" \
  -d '{"email":"admin@test.local","password":"testpassword123","name":"Admin"}' \
  >/dev/null 2>&1 || true
"""

# Run playwright SSO tests
[[steps]]
action = "playwright"
name = "playwright-sso-tests"
spec = "immich-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
