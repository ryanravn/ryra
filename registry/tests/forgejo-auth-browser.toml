[test]
name = "forgejo-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install forgejo with OIDC auth
[[steps]]
action = "add"
service = "forgejo"
args = "--auth"
timeout = 600

[[steps]]
action = "wait"
service = "forgejo"

# Wait for OIDC provider registration (ExecStartPost runs register-oidc.sh)
[[steps]]
action = "shell"
name = "oidc-registered"
run = """FORGEJO_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/forgejo/.env | cut -d= -f2)
for i in $(seq 1 60); do
  curl -sf http://127.0.0.1:$FORGEJO_PORT/user/login 2>/dev/null | grep -q 'oauth2/Authelia' && exit 0
  sleep 2
done
echo "OIDC provider not found after 120s"
podman exec -u git forgejo forgejo admin auth list 2>&1 || true
journalctl --user -u forgejo.service --no-pager -n 20 2>&1 | grep -iE 'oidc|oauth|error|fail' || true
exit 1"""
timeout = 150

# Wait for forgejo to respond
[[steps]]
action = "http"
name = "forgejo-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "forgejo"
poll = { interval = 2, attempts = 30 }
timeout = 90

# Wait for authelia to respond via caddy
[[steps]]
action = "http"
name = "authelia-via-caddy"
url = "https://auth.localhost:8443"

# Run playwright auth flow tests
[[steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "forgejo-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
