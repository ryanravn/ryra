[test]
name = "forgejo-auth-browser"
browser = true

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia
[[steps]]
action = "run"
name = "add-authelia"
run = """AUTHELIA_ADMIN_USER=testuser AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --url https://auth.test.local:8443"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install forgejo with OIDC auth
[[steps]]
action = "run"
name = "add-forgejo"
run = "ryra add forgejo --auth"
timeout = 600

[[steps]]
action = "wait"
service = "forgejo"

# The browser (Playwright on the host) needs /etc/hosts to resolve .test.local domains.
[[steps]]
action = "run"
name = "setup-hosts"
run = "echo '127.0.0.1 auth.test.local' >> /etc/hosts"

# Wait for OIDC provider registration (ExecStartPost runs register-oidc.sh)
[[steps]]
action = "assert"
name = "oidc-registered"
run = """FORGEJO_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/forgejo/.env | cut -d= -f2)
for i in $(seq 1 60); do
  curl -sf http://127.0.0.1:$FORGEJO_PORT/user/login 2>/dev/null | grep -q 'oauth2/Authelia' && exit 0
  sleep 2
done
echo "OIDC provider not found after 120s"
podman exec -u git forgejo forgejo admin auth list 2>&1 || true
journalctl --user -u forgejo.service --no-pager -n 20 2>&1 | grep -iE 'oidc|oauth|error|fail' || true
exit 1"""
timeout = 150

# Wait for forgejo to respond
[[steps]]
action = "assert"
name = "forgejo-responds"
run = "for i in $(seq 1 30); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/forgejo/.env | cut -d= -f2) | grep -qE '^(200|302)' && exit 0; sleep 2; done; exit 1"
timeout = 90

# Wait for authelia to respond via caddy
[[steps]]
action = "assert"
name = "authelia-via-caddy"
run = "curl -sk -o /dev/null -w '%{http_code}' --resolve auth.test.local:8443:127.0.0.1 https://auth.test.local:8443 | grep -qE '^(200|302)'"

# Run playwright auth flow tests
[[steps]]
action = "assert"
name = "playwright-auth-flow"
run = """
export PATH="$HOME/.bun/bin:$PATH"
export FORGEJO_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/forgejo/.env | cut -d= -f2)
export AUTHELIA_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/authelia/.env | cut -d= -f2)
export AUTHELIA_USER=testuser
export AUTHELIA_PASSWORD=testpassword123
cd /opt/ryra-test-registry/tests/browser
ln -sf /opt/playwright/node_modules .
bunx playwright test forgejo-auth.spec.ts --reporter=list
"""
timeout = 120
