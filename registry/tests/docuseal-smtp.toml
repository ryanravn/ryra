[test]
name = "docuseal-smtp"

[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

[[steps]]
action = "add"
service = "docuseal"
args = "--smtp=inbucket"
timeout = 300

[[steps]]
action = "wait"
service = "docuseal"

[[steps]]
action = "http"
name = "docuseal-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "docuseal"
poll = { interval = 2, attempts = 45 }
timeout = 120

# Send a mail through DocuSeal's own Rails/Mail stack via `rails runner` —
# this uses its configured ActionMailer settings end-to-end, proving the
# SMTP env vars landed correctly without needing admin signup + API token +
# submission creation. STARTTLS is force-disabled because inbucket is plain
# SMTP and DocuSeal's default Mail config opportunistically negotiates it.
[[steps]]
action = "shell"
name = "trigger-smtp-mail"
run = """for i in $(seq 1 10); do
  podman exec -w /app docuseal bundle exec rails runner \
    's=ActionMailer::Base.smtp_settings.merge(enable_starttls: false, openssl_verify_mode: 0); Mail.defaults { delivery_method :smtp, s }; Mail.deliver { from "ryra@localhost"; to "smtptest@ryra.local"; subject "ryra smtp test"; body "delivered through inbucket" }' && exit 0
  sleep 3
done
exit 1"""
timeout = 90

[[steps]]
action = "shell"
name = "mail-delivered-to-inbucket"
run = """INBUCKET_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/inbucket/.env | cut -d= -f2)
for i in $(seq 1 30); do
  BODY=$(curl -sf http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest 2>/dev/null)
  if [ -n "$BODY" ] && [ "$BODY" != "[]" ]; then
    echo "$BODY" | grep -q 'ryra smtp test' && exit 0
  fi
  sleep 2
done
echo "no mail for smtptest@ryra.local after 60s"
curl -sf "http://127.0.0.1:$INBUCKET_PORT/api/v1/mailbox/smtptest" || true
exit 1"""
timeout = 90
