[test]
name = "paperless-ngx-auth-browser"
browser = true
ram = 2048

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia with .localhost domain (resolves to 127.0.0.1 via RFC 6761)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install paperless-ngx with OIDC auth
[[steps]]
action = "add"
service = "paperless-ngx"
args = "--auth"
env = { PAPERLESS_ADMIN_USER = "admin", PAPERLESS_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "paperless-ngx"

# Wait for paperless-ngx to respond
[[steps]]
action = "http"
name = "paperless-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "paperless-ngx"
poll = { interval = 2, attempts = 30 }
timeout = 90

# Run playwright SSO test
[[steps]]
action = "playwright"
name = "playwright-auth-flow"
spec = "paperless-ngx-auth.spec.ts"
timeout = 120
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
