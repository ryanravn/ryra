[test]
name = "paperless-ngx-auth-browser"
browser = true
ram = 2048

# Install caddy
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia
[[steps]]
action = "run"
name = "add-authelia"
run = """AUTHELIA_ADMIN_USER=testuser AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --url https://auth.test.local:8443"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install paperless-ngx with OIDC auth
[[steps]]
action = "run"
name = "add-paperless-ngx"
run = """PAPERLESS_ADMIN_USER=admin PAPERLESS_ADMIN_PASSWORD=testpassword123 \
ryra add paperless-ngx --auth"""
timeout = 300

[[steps]]
action = "wait"
service = "paperless-ngx"

# Setup /etc/hosts for browser
[[steps]]
action = "run"
name = "setup-hosts"
run = "echo '127.0.0.1 auth.test.local' >> /etc/hosts"

# Wait for paperless-ngx to respond
[[steps]]
action = "assert"
name = "paperless-responds"
run = "for i in $(seq 1 30); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/paperless-ngx/.env | cut -d= -f2) | grep -qE '^(200|302)' && exit 0; sleep 2; done; exit 1"
timeout = 90

# Run playwright SSO test
[[steps]]
action = "assert"
name = "playwright-auth-flow"
run = """
export PATH="$HOME/.bun/bin:$PATH"
export PAPERLESS_PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/paperless-ngx/.env | cut -d= -f2)
export AUTHELIA_USER=testuser
export AUTHELIA_PASSWORD=testpassword123
cd /opt/ryra-test-registry/tests/browser
ln -sf /opt/playwright/node_modules .
bunx playwright test paperless-ngx-auth.spec.ts --reporter=list
"""
timeout = 120
