[test]
name = "multi-oidc-lifecycle"
ram = 5632

# Install caddy (needed for authelia HTTPS)
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia (shared OIDC provider)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.internal:8443"
env = { AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install nextcloud with OIDC
[[steps]]
action = "add"
service = "nextcloud"
args = "--auth"
env = { NEXTCLOUD_ADMIN_PASSWORD = "testpassword123" }
timeout = 900

[[steps]]
action = "wait"
service = "nextcloud"

# Install immich with OIDC
[[steps]]
action = "add"
service = "immich"
args = "--auth"
env = { INIT_IMMICH_ADMIN_EMAIL = "admin@example.com", INIT_IMMICH_ADMIN_PASSWORD = "testpassword123" }
timeout = 900

[[steps]]
action = "wait"
service = "immich"

# Verify nextcloud responds
[[steps]]
action = "http"
name = "nextcloud-http-responds"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP/status.php"
service = "nextcloud"
poll = { interval = 5, attempts = 80 }
timeout = 480

# Verify nextcloud OIDC configured (user_oidc provider registered via occ)
[[steps]]
action = "shell"
name = "nextcloud-oidc-configured"
run = """for i in $(seq 1 60); do
  podman exec -u www-data nextcloud php occ user_oidc:provider 2>/dev/null | grep -qi 'authelia' && exit 0
  sleep 5
done
exit 1"""
timeout = 320

# Verify immich responds
[[steps]]
action = "http"
name = "immich-http-responds"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP/api/server/ping"
service = "immich"
poll = { interval = 5, attempts = 60 }
timeout = 360

# Verify immich OIDC configured
[[steps]]
action = "shell"
name = "immich-oauth-configured"
run = """
PORT=$(grep SERVICE_PORT_HTTP $HOME/.local/share/services/immich/.env | cut -d= -f2)
EMAIL=$(grep INIT_IMMICH_ADMIN_EMAIL $HOME/.local/share/services/immich/.env | cut -d= -f2)
PASS=$(grep INIT_IMMICH_ADMIN_PASSWORD $HOME/.local/share/services/immich/.env | cut -d= -f2)
python3 -c "
import json, urllib.request
url = 'http://127.0.0.1:' + '$PORT'
body = json.dumps({'email': '$EMAIL', 'password': '$PASS'}).encode()
req = urllib.request.Request(url + '/api/auth/login', data=body, headers={'Content-Type': 'application/json'})
token = json.loads(urllib.request.urlopen(req).read())['accessToken']
req2 = urllib.request.Request(url + '/api/system-config', headers={'Authorization': 'Bearer ' + token})
config = json.loads(urllib.request.urlopen(req2).read())
assert config['oauth']['enabled'] == True, 'OAuth not enabled'
assert config['oauth']['clientId'] != '', 'No client ID'
print('OIDC verified: enabled with client_id=' + config['oauth']['clientId'][:8] + '...')
"
"""
timeout = 30

# Cleanup
[[steps]]
action = "remove"
service = "immich"

[[steps]]
action = "remove"
service = "nextcloud"
