[test]
name = "multi-oidc-lifecycle"

# Install caddy (needed for --domain and --auth)
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Install authelia (shared OIDC provider)
[[steps]]
action = "run"
name = "add-authelia"
run = """AUTHELIA_ADMIN_PASSWORD=testpassword123 \
ryra add authelia --domain auth.test.local --repo /opt/ryra-test-registry"""
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install seafile with OIDC
[[steps]]
action = "run"
name = "add-seafile"
run = """INIT_SEAFILE_ADMIN_EMAIL=admin@test.local \
INIT_SEAFILE_ADMIN_PASSWORD=testpassword123 \
ryra add seafile --auth --domain seafile.test.local --repo /opt/ryra-test-registry"""
timeout = 900

[[steps]]
action = "wait"
service = "seafile"

# Install immich with OIDC
[[steps]]
action = "run"
name = "add-immich"
run = """INIT_IMMICH_ADMIN_EMAIL=admin@test.local \
INIT_IMMICH_ADMIN_PASSWORD=testpassword123 \
ryra add immich --auth --domain immich.test.local --repo /opt/ryra-test-registry"""
timeout = 900

[[steps]]
action = "wait"
service = "immich"

# Verify seafile responds
[[steps]]
action = "assert"
name = "seafile-http-responds"
run = "for i in $(seq 1 60); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/seafile/.env | cut -d= -f2) 2>/dev/null | grep -qE '^(200|301|302)' && exit 0; sleep 5; done; exit 1"
timeout = 360

# Verify seafile OIDC configured
[[steps]]
action = "assert"
name = "seafile-oauth-configured"
run = "test -f $HOME/.local/share/ryra/seafile/shared/seafile/conf/seahub_settings_oauth.py && grep -q OAUTH_CLIENT_ID $HOME/.local/share/ryra/seafile/shared/seafile/conf/seahub_settings_oauth.py"

# Verify immich responds
[[steps]]
action = "assert"
name = "immich-http-responds"
run = "for i in $(seq 1 60); do curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/immich/.env | cut -d= -f2)/api/server/ping 2>/dev/null | grep -q '200' && exit 0; sleep 5; done; exit 1"
timeout = 360

# Verify immich OIDC configured
[[steps]]
action = "assert"
name = "immich-oauth-configured"
run = """
PORT=$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/immich/.env | cut -d= -f2)
EMAIL=$(grep INIT_IMMICH_ADMIN_EMAIL $HOME/.local/share/ryra/immich/.env | cut -d= -f2)
PASS=$(grep INIT_IMMICH_ADMIN_PASSWORD $HOME/.local/share/ryra/immich/.env | cut -d= -f2)
python3 -c "
import json, urllib.request
url = 'http://127.0.0.1:' + '$PORT'
body = json.dumps({'email': '$EMAIL', 'password': '$PASS'}).encode()
req = urllib.request.Request(url + '/api/auth/login', data=body, headers={'Content-Type': 'application/json'})
token = json.loads(urllib.request.urlopen(req).read())['accessToken']
req2 = urllib.request.Request(url + '/api/system-config', headers={'Authorization': 'Bearer ' + token})
config = json.loads(urllib.request.urlopen(req2).read())
assert config['oauth']['enabled'] == True, 'OAuth not enabled'
assert config['oauth']['clientId'] != '', 'No client ID'
print('OIDC verified: enabled with client_id=' + config['oauth']['clientId'][:8] + '...')
"
"""
timeout = 30

# Cleanup
[[steps]]
action = "remove"
service = "immich"

[[steps]]
action = "remove"
service = "seafile"
