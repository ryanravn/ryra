[test]
name = "full-stack"

# Set up Caddy first (needed for authelia HTTPS)
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Authelia — lightweight SSO (boots in seconds, no migrations)
[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.localhost:8443"
env = { AUTHELIA_ADMIN_PASSWORD = "testpassword123" }

[[steps]]
action = "wait"
service = "authelia"

# Postgres — standalone database (no domain, no auth)
[[steps]]
action = "add"
service = "postgres"

[[steps]]
action = "wait"
service = "postgres"

# Whoami — no auth (doesn't support native OIDC)
[[steps]]
action = "add"
service = "whoami"

[[steps]]
action = "wait"
service = "whoami"

# Forgejo
[[steps]]
action = "add"
service = "forgejo"
timeout = 300

[[steps]]
action = "wait"
service = "forgejo"

# Vaultwarden (requires HTTPS)
[[steps]]
action = "add"
service = "vaultwarden"
args = "--url https://vault.localhost:8443"

[[steps]]
action = "wait"
service = "vaultwarden"

# Uptime Kuma
[[steps]]
action = "add"
service = "uptime-kuma"

[[steps]]
action = "wait"
service = "uptime-kuma"

# === Assertions: Services respond ===

[[steps]]
action = "http"
name = "authelia-health"
url = "http://127.0.0.1:$RYRA_PORT_HTTP/api/health"
service = "authelia"
poll = { interval = 2, attempts = 15 }

[[steps]]
action = "http"
name = "whoami-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "whoami"

[[steps]]
action = "http"
name = "forgejo-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "forgejo"
poll = { interval = 3, attempts = 20 }
timeout = 90

[[steps]]
action = "http"
name = "vaultwarden-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "vaultwarden"

[[steps]]
action = "http"
name = "uptime-kuma-responds"
url = "http://127.0.0.1:$RYRA_PORT_HTTP"
service = "uptime-kuma"
poll = { interval = 3, attempts = 10 }
timeout = 60

[[steps]]
action = "shell"
name = "postgres-accepts"
run = "PGPASSWORD=$(grep POSTGRES_PASSWORD $HOME/.local/share/ryra/postgres/.env | cut -d= -f2) psql -h 127.0.0.1 -p $(grep RYRA_PORT_TCP $HOME/.local/share/ryra/postgres/.env | cut -d= -f2) -U postgres -c 'SELECT 1'"

# === Assertions: Authelia Caddy route ===

[[steps]]
action = "shell"
name = "caddy-has-authelia-route"
run = "grep -q 'ryra:authelia' $HOME/.local/share/ryra/caddy/config/Caddyfile"

[[steps]]
action = "shell"
name = "authelia-accessible-via-caddy"
run = "CODE=$(curl -sk -o /dev/null -w '%{http_code}' https://auth.localhost:8443); [ \"$CODE\" = '200' ] || [ \"$CODE\" = '302' ]"

# Services are accessed directly on localhost
[[steps]]
action = "shell"
name = "whoami-direct-access"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/whoami/.env | cut -d= -f2) | grep -q Hostname"

# === Status ===

[[steps]]
action = "shell"
name = "status-shows-all"
run = "ryra list | grep -q whoami && ryra list | grep -q forgejo && ryra list | grep -q vaultwarden && ryra list | grep -q authelia && ryra list | grep -q caddy"
