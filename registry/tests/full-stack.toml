[test]
name = "full-stack"
services = ["caddy", "authentik", "postgres", "whoami", "forgejo", "vaultwarden", "uptime-kuma"]

# Set up Caddy first
[[steps]]
action = "run"
name = "init-caddyfile"
run = "sudo mkdir -p /etc/ryra/caddy && echo '' | sudo tee /etc/ryra/caddy/Caddyfile"

[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Authentik — SSO provider (installed first so all subsequent services get auth)
[[steps]]
action = "run"
name = "add-authentik"
run = "AUTHENTIK_BOOTSTRAP_EMAIL=admin@test.local AUTHENTIK_BOOTSTRAP_PASSWORD=testpassword123 ryra add authentik --domain auth.test.local --repo /opt/ryra-test-registry"
timeout = 300

[[steps]]
action = "wait"
service = "authentik"
timeout = 300

# Postgres — standalone database (no domain, no auth)
[[steps]]
action = "add"
service = "postgres"

[[steps]]
action = "wait"
service = "postgres"

# Whoami — gets Caddy forward auth (no native OIDC)
[[steps]]
action = "run"
name = "add-whoami"
run = "ryra add whoami --domain whoami.test.local --repo /opt/ryra-test-registry"

[[steps]]
action = "wait"
service = "whoami"

# Forgejo — gets Caddy forward auth (no native OIDC mappings yet)
[[steps]]
action = "run"
name = "add-forgejo"
run = "ryra add forgejo --domain git.test.local --repo /opt/ryra-test-registry"
timeout = 300

[[steps]]
action = "wait"
service = "forgejo"

# Vaultwarden — gets Caddy forward auth
[[steps]]
action = "run"
name = "add-vaultwarden"
run = "ryra add vaultwarden --domain vault.test.local --repo /opt/ryra-test-registry"

[[steps]]
action = "wait"
service = "vaultwarden"

# Uptime Kuma — gets Caddy forward auth
[[steps]]
action = "run"
name = "add-uptime-kuma"
run = "ryra add uptime-kuma --domain status.test.local --repo /opt/ryra-test-registry"

[[steps]]
action = "wait"
service = "uptime-kuma"

# === Assertions: Services respond ===

[[steps]]
action = "assert"
name = "whoami-responds"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/whoami/.env | cut -d= -f2)"

[[steps]]
action = "assert"
name = "forgejo-responds"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/forgejo/.env | cut -d= -f2)"

[[steps]]
action = "assert"
name = "vaultwarden-responds"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/vaultwarden/.env | cut -d= -f2)"

[[steps]]
action = "assert"
name = "uptime-kuma-responds"
run = "for i in $(seq 1 10); do curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/uptime-kuma/.env | cut -d= -f2) && exit 0; sleep 3; done; exit 1"
timeout = 60

[[steps]]
action = "assert"
name = "postgres-accepts"
run = "PGPASSWORD=$(grep POSTGRES_PASSWORD $HOME/.local/share/ryra/postgres/.env | cut -d= -f2) psql -h 127.0.0.1 -p $(grep RYRA_PORT_TCP $HOME/.local/share/ryra/postgres/.env | cut -d= -f2) -U postgres -c 'SELECT 1'"

# === Assertions: Caddy routes exist ===

[[steps]]
action = "assert"
name = "caddy-has-all-routes"
run = "sudo grep -q 'ryra:whoami' /etc/ryra/caddy/Caddyfile && sudo grep -q 'ryra:forgejo' /etc/ryra/caddy/Caddyfile && sudo grep -q 'ryra:vaultwarden' /etc/ryra/caddy/Caddyfile && sudo grep -q 'ryra:uptime-kuma' /etc/ryra/caddy/Caddyfile && sudo grep -q 'ryra:authentik' /etc/ryra/caddy/Caddyfile"

# === Assertions: Forward auth on non-OIDC services ===

[[steps]]
action = "assert"
name = "whoami-has-forward-auth"
run = "sudo awk '/ryra:whoami/,/^}/' /etc/ryra/caddy/Caddyfile | grep -q 'forward_auth'"

[[steps]]
action = "assert"
name = "forgejo-has-forward-auth"
run = "sudo awk '/ryra:forgejo/,/^}/' /etc/ryra/caddy/Caddyfile | grep -q 'forward_auth'"

[[steps]]
action = "assert"
name = "vaultwarden-has-forward-auth"
run = "sudo awk '/ryra:vaultwarden/,/^}/' /etc/ryra/caddy/Caddyfile | grep -q 'forward_auth'"

[[steps]]
action = "assert"
name = "uptime-kuma-has-forward-auth"
run = "sudo awk '/ryra:uptime-kuma/,/^}/' /etc/ryra/caddy/Caddyfile | grep -q 'forward_auth'"

# Authentik itself should NOT have forward auth (it IS the auth provider)
[[steps]]
action = "assert"
name = "authentik-no-forward-auth"
run = "! sudo awk '/ryra:authentik/,/^}/' /etc/ryra/caddy/Caddyfile | grep -q 'forward_auth'"

# === Assertions: Auth actually works (curl through Caddy gets blocked) ===

# Wait for authentik to be fully ready (API needs to respond for forward_auth to work)
[[steps]]
action = "run"
name = "wait-authentik-api"
run = "for i in $(seq 1 60); do curl -sf http://127.0.0.1:9000/if/flow/initial-setup/ && exit 0; sleep 5; done; exit 1"
timeout = 360

# Unauthenticated requests through Caddy should NOT get the raw service response.
# They should get a 401 or 302 redirect to Authentik.
[[steps]]
action = "assert"
name = "whoami-blocked-via-caddy"
run = "CODE=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: whoami.test.local' http://127.0.0.1:80); [ \"$CODE\" = '401' ] || [ \"$CODE\" = '302' ] || [ \"$CODE\" = '403' ]"

[[steps]]
action = "assert"
name = "forgejo-blocked-via-caddy"
run = "CODE=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: git.test.local' http://127.0.0.1:80); [ \"$CODE\" = '401' ] || [ \"$CODE\" = '302' ] || [ \"$CODE\" = '403' ]"

[[steps]]
action = "assert"
name = "vaultwarden-blocked-via-caddy"
run = "CODE=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: vault.test.local' http://127.0.0.1:80); [ \"$CODE\" = '401' ] || [ \"$CODE\" = '302' ] || [ \"$CODE\" = '403' ]"

# Authentik itself should be accessible (no forward auth)
[[steps]]
action = "assert"
name = "authentik-accessible-via-caddy"
run = "CODE=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: auth.test.local' http://127.0.0.1:80); [ \"$CODE\" = '200' ] || [ \"$CODE\" = '302' ]"
timeout = 30

# Direct access (bypassing Caddy) should still work — no auth on the raw port
[[steps]]
action = "assert"
name = "whoami-direct-no-auth"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/whoami/.env | cut -d= -f2) | grep -q Hostname"

# === Status ===

[[steps]]
action = "assert"
name = "status-shows-all"
run = "ryra list | grep -q whoami && ryra list | grep -q forgejo && ryra list | grep -q vaultwarden && ryra list | grep -q authentik && ryra list | grep -q caddy"
