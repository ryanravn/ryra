[test]
name = "full-stack"
services = ["caddy", "authelia", "postgres", "whoami", "forgejo", "vaultwarden", "uptime-kuma"]

# Set up Caddy first
[[steps]]
action = "run"
name = "init-caddyfile"
run = "mkdir -p $HOME/.local/share/ryra/caddy/config && touch $HOME/.local/share/ryra/caddy/config/Caddyfile"

[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

# Authelia — lightweight SSO (boots in seconds, no migrations)
[[steps]]
action = "run"
name = "add-authelia"
run = "AUTHELIA_ADMIN_PASSWORD=testpassword123 ryra add authelia --domain auth.test.local --repo /opt/ryra-test-registry"

[[steps]]
action = "wait"
service = "authelia"

# Postgres — standalone database (no domain, no auth)
[[steps]]
action = "add"
service = "postgres"

[[steps]]
action = "wait"
service = "postgres"

# Whoami — gets Caddy forward auth (no native OIDC)
[[steps]]
action = "run"
name = "add-whoami"
run = "ryra add whoami --domain whoami.test.local --auth --repo /opt/ryra-test-registry"

[[steps]]
action = "wait"
service = "whoami"

# Forgejo — gets Caddy forward auth
[[steps]]
action = "run"
name = "add-forgejo"
run = "ryra add forgejo --domain git.test.local --repo /opt/ryra-test-registry"
timeout = 300

[[steps]]
action = "wait"
service = "forgejo"

# Vaultwarden — gets Caddy forward auth
[[steps]]
action = "run"
name = "add-vaultwarden"
run = "ryra add vaultwarden --domain vault.test.local --repo /opt/ryra-test-registry"

[[steps]]
action = "wait"
service = "vaultwarden"

# Uptime Kuma — gets Caddy forward auth
[[steps]]
action = "run"
name = "add-uptime-kuma"
run = "ryra add uptime-kuma --domain status.test.local --repo /opt/ryra-test-registry"

[[steps]]
action = "wait"
service = "uptime-kuma"

# === Assertions: Services respond ===

[[steps]]
action = "assert"
name = "authelia-health"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/authelia/.env | cut -d= -f2)/api/health"

[[steps]]
action = "assert"
name = "whoami-responds"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/whoami/.env | cut -d= -f2)"

[[steps]]
action = "assert"
name = "forgejo-responds"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/forgejo/.env | cut -d= -f2)"

[[steps]]
action = "assert"
name = "vaultwarden-responds"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/vaultwarden/.env | cut -d= -f2)"

[[steps]]
action = "assert"
name = "uptime-kuma-responds"
run = "for i in $(seq 1 10); do curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/uptime-kuma/.env | cut -d= -f2) && exit 0; sleep 3; done; exit 1"
timeout = 60

[[steps]]
action = "assert"
name = "postgres-accepts"
run = "PGPASSWORD=$(grep POSTGRES_PASSWORD $HOME/.local/share/ryra/postgres/.env | cut -d= -f2) psql -h 127.0.0.1 -p $(grep RYRA_PORT_TCP $HOME/.local/share/ryra/postgres/.env | cut -d= -f2) -U postgres -c 'SELECT 1'"

# === Assertions: Caddy routes + forward auth ===

[[steps]]
action = "assert"
name = "caddy-has-all-routes"
run = "grep -q 'ryra:whoami' $HOME/.local/share/ryra/caddy/config/Caddyfile && grep -q 'ryra:forgejo' $HOME/.local/share/ryra/caddy/config/Caddyfile && grep -q 'ryra:vaultwarden' $HOME/.local/share/ryra/caddy/config/Caddyfile && grep -q 'ryra:uptime-kuma' $HOME/.local/share/ryra/caddy/config/Caddyfile && grep -q 'ryra:authelia' $HOME/.local/share/ryra/caddy/config/Caddyfile"

[[steps]]
action = "assert"
name = "whoami-has-forward-auth"
run = "awk '/ryra:whoami/,/^}/' $HOME/.local/share/ryra/caddy/config/Caddyfile | grep -q 'forward_auth'"

[[steps]]
action = "assert"
name = "uses-authelia-endpoint"
run = "grep -q '/api/authz/forward-auth' $HOME/.local/share/ryra/caddy/config/Caddyfile"

# Authelia itself should NOT have forward auth
[[steps]]
action = "assert"
name = "authelia-no-forward-auth"
run = "! awk '/ryra:authelia/,/^}/' $HOME/.local/share/ryra/caddy/config/Caddyfile | grep -q 'forward_auth'"

# === Auth actually blocks unauthenticated requests ===

[[steps]]
action = "assert"
name = "whoami-blocked-via-caddy"
run = "CODE=$(curl -sk -o /dev/null -w '%{http_code}' --resolve whoami.test.local:8443:127.0.0.1 https://whoami.test.local:8443); [ \"$CODE\" = '401' ] || [ \"$CODE\" = '302' ] || [ \"$CODE\" = '403' ]"

[[steps]]
action = "assert"
name = "authelia-accessible-via-caddy"
run = "CODE=$(curl -sk -o /dev/null -w '%{http_code}' --resolve auth.test.local:8443:127.0.0.1 https://auth.test.local:8443); [ \"$CODE\" = '200' ] || [ \"$CODE\" = '302' ]"

# Direct access bypasses auth
[[steps]]
action = "assert"
name = "whoami-direct-no-auth"
run = "curl -sf http://127.0.0.1:$(grep RYRA_PORT_HTTP $HOME/.local/share/ryra/whoami/.env | cut -d= -f2) | grep -q Hostname"

# === Status ===

[[steps]]
action = "assert"
name = "status-shows-all"
run = "ryra list | grep -q whoami && ryra list | grep -q forgejo && ryra list | grep -q vaultwarden && ryra list | grep -q authelia && ryra list | grep -q caddy"
