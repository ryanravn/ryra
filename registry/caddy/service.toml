[service]
name = "caddy"
description = "Caddy - automatic HTTPS reverse proxy"
url = "https://caddyserver.com"
architecture = ["amd64", "arm64"]

[[ports]]
name = "http"
container_port = 80
host_port = 8080

[[ports]]
name = "https"
container_port = 8443
host_port = 8443

[integrations]
auth = []
smtp = false
