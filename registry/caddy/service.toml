[service]
name = "caddy"
description = "Caddy - automatic HTTPS reverse proxy"
url = "https://caddyserver.com"
image = "docker.io/library/caddy:2-alpine"
architecture = ["amd64", "arm64"]

[[ports]]
name = "http"
container_port = 80
host_port = 8080

[[ports]]
name = "https"
container_port = 443
host_port = 8443

[[volumes]]
name = "data"
mount_path = "/data"

[[volumes]]
name = "config-state"
mount_path = "/config"

[[volumes]]
name = "caddyfile-dir"
mount_path = "/etc/caddy"
host_path = "%h/config"

[integrations]
auth = []
smtp = false
