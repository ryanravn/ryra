[service]
name = "caddy"
description = "Caddy - automatic HTTPS reverse proxy"
url = "https://caddyserver.com"
image = "docker.io/library/caddy:2-alpine"
architecture = ["amd64", "arm64"]

[[ports]]
name = "http"
container_port = 80
host_port = 8080

[[ports]]
name = "https"
container_port = 8443
host_port = 8443

[[volumes]]
name = "data"
mount_path = "/data"

[[volumes]]
name = "config-state"
mount_path = "/config"

[[volumes]]
name = "caddyfile-dir"
mount_path = "/etc/caddy"
host_path = "%h/config"

[[pre_start]]
name = "seed-caddyfile"
timeout = 10
run = """
CADDYFILE="$HOME/.local/share/ryra/caddy/config/Caddyfile"
[ -f "$CADDYFILE" ] && exit 0
cat > "$CADDYFILE" <<'EOF'
:80 {
	respond 404
}

:8443 {
	tls internal
	respond 404
}
EOF
"""

[integrations]
auth = []
smtp = false
