[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

[[steps]]
action = "shell"
name = "responds-on-http-port"
run = ". $HOME/.local/share/ryra/caddy/.env && curl -so /dev/null -w '%{http_code}' http://127.0.0.1:$RYRA_PORT_HTTP | grep -qE '200|404'"

[[steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/ryra/caddy"
