[package]
name = "ryra-test"
version = "0.1.0"
edition = "2024"

[lib]
name = "ryra_test"
path = "src/lib.rs"

[dependencies]
ryra-vm = { path = "../ryra-vm" }
anyhow.workspace = true
clap = { version = "4", features = ["derive"] }
tokio = { workspace = true, features = ["sync", "time", "net", "fs", "signal"] }
serde.workspace = true
toml.workspace = true
