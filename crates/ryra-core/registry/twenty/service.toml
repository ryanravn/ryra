[service]
name = "twenty"
description = "Twenty - open-source CRM alternative to Salesforce"
url = "https://twenty.com/"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 1024
recommended = 2048

[[ports]]
name = "http"
container_port = 3000

# --- Postgres env vars (shared with postgres sidecar) ---

[[env]]
name = "POSTGRES_USER"
value = "twenty"

[[env]]
name = "POSTGRES_PASSWORD"
value = "{{secret.db_password}}"

[[env]]
name = "POSTGRES_DB"
value = "twenty"

# --- Twenty server env vars ---

[[env]]
name = "PG_DATABASE_URL"
value = "postgresql://twenty:{{secret.db_password}}@db:5432/twenty"

[[env]]
name = "REDIS_URL"
value = "redis://redis:6379"

[[env]]
name = "APP_SECRET"
value = "{{secret.app_secret}}"
format = "hex"
length = 64

[[env]]
name = "SERVER_URL"
value = "{{service.external_url}}"

[[env]]
name = "NODE_ENV"
value = "production"

[[env]]
name = "STORAGE_TYPE"
value = "local"

# --- Optional group: Google SSO + Gmail/Calendar sync ---
# Twenty needs the full bundle of client_id/secret/callback URLs together;
# enabling this group (interactively or via --enable google_oauth) writes
# every member into .env, disabling it leaves all seven out.

[[env_group]]
name = "google_oauth"
prompt = "Enable Google SSO + Gmail/Calendar sync?"

[[env_group.env]]
name = "AUTH_GOOGLE_CLIENT_ID"
value = ""
kind = "required"
prompt = "Google OAuth client ID"

[[env_group.env]]
name = "AUTH_GOOGLE_CLIENT_SECRET"
value = ""
kind = "required"
prompt = "Google OAuth client secret"

[[env_group.env]]
name = "AUTH_GOOGLE_CALLBACK_URL"
value = "{{service.external_url}}/auth/google/redirect"

[[env_group.env]]
name = "AUTH_GOOGLE_APIS_CALLBACK_URL"
value = "{{service.external_url}}/auth/google-apis/get-access-token"

[[env_group.env]]
name = "AUTH_GOOGLE_ENABLED"
value = "true"

[[env_group.env]]
name = "MESSAGING_PROVIDER_GMAIL_ENABLED"
value = "true"

[[env_group.env]]
name = "CALENDAR_PROVIDER_GOOGLE_ENABLED"
value = "true"

[integrations]
auth = []
smtp = true
# File-level backup of db-data + the docker-data volume (file
# attachments, workspace artefacts). Redis is regenerable cache,
# so it's excluded.
backup = true

[backup]
paths = ["db-data", "data"]

[mappings.smtp]
EMAIL_DRIVER = "smtp"
EMAIL_SMTP_HOST = "{{smtp.host}}"
EMAIL_SMTP_PORT = "{{smtp.port}}"
EMAIL_SMTP_USER = "{{smtp.username}}"
EMAIL_SMTP_PASSWORD = "{{smtp.password}}"
# Twenty's default is to opportunistically STARTTLS the connection; flip
# to "true" for plaintext SMTP servers (e.g. inbucket in tests).
EMAIL_SMTP_NO_TLS = "{{ smtp.security | smtp_no_tls }}"
# The app default is `noreply@yourdomain.com`, which bounces in most
# providers and shows up oddly in test sinks. Use the configured sender.
EMAIL_FROM_ADDRESS = "{{smtp.from}}"
EMAIL_FROM_NAME = "Twenty"
