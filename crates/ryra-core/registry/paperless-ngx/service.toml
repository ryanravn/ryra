[service]
name = "paperless-ngx"
description = "Paperless-ngx - document management with OCR, auto-tagging, and full-text search"
url = "https://docs.paperless-ngx.com/"
architecture = ["amd64", "arm64"]
https = "auth"

[requirements.ram]
min = 512
recommended = 1024

[[ports]]
name = "http"
container_port = 8000

# --- Admin account (created on first boot) ---

[[env]]
name = "PAPERLESS_ADMIN_USER"
value = "admin"
kind = "prompted"
prompt = "Admin username"

[[env]]
name = "PAPERLESS_ADMIN_PASSWORD"
value = "{{secret.admin_password}}"
kind = "prompted"
prompt = "Admin password"

[[env]]
name = "PAPERLESS_ADMIN_MAIL"
value = "{{admin.email | default('admin@example.com')}}"

# --- Redis connection ---

[[env]]
name = "PAPERLESS_REDIS"
value = "redis://redis:6379"

# --- URL (set automatically from --url) ---

[[env]]
name = "PAPERLESS_URL"
value = "{{service.external_url}}"

[integrations]
auth = ["oidc"]
oidc_callbacks = ["/accounts/oidc/authelia/login/callback/"]
smtp = true
# Paperless uses bundled sqlite (no separate postgres container),
# so file-level backup with the service stopped is sufficient — the
# sqlite file lives inside `data/`. Media holds the ingested
# documents. Redis is the Celery task queue; in-flight jobs are
# regenerable (paperless retries on next start), so it's excluded.
backup = true

[backup]
paths = ["data", "media"]

[mappings.smtp]
PAPERLESS_EMAIL_HOST = "{{smtp.host}}"
PAPERLESS_EMAIL_PORT = "{{smtp.port}}"
PAPERLESS_EMAIL_HOST_USER = "{{smtp.username}}"
PAPERLESS_EMAIL_HOST_PASSWORD = "{{smtp.password}}"
PAPERLESS_EMAIL_FROM = "{{smtp.from}}"

[mappings.auth]
PAPERLESS_APPS = "allauth.socialaccount.providers.openid_connect"
PAPERLESS_SOCIALACCOUNT_PROVIDERS = '{"openid_connect":{"APPS":[{"provider_id":"authelia","name":"SSO","client_id":"{{auth.client_id}}","secret":"{{auth.client_secret}}","settings":{"server_url":"{{auth.external_url}}/.well-known/openid-configuration","token_auth_method":"client_secret_post"}}]}}'
PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS = "true"
PAPERLESS_SOCIAL_AUTO_SIGNUP = "true"
PAPERLESS_ACCOUNT_DEFAULT_HTTP_PROTOCOL = "{{service.scheme}}"
