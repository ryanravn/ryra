## Custom nginx config for element-web container.
## Serves Element's static bundle AND reverse-proxies Matrix API paths to
## the Synapse container on the shared podman network. Single-origin setup
## means Element's config.json can just point `base_url` at the same host
## the user typed into their browser.

# If an upstream proxy (e.g. Caddy) sets X-Forwarded-Proto, trust it. Without
# this Synapse sees scheme=http and Host without port, bounces clients back to
# its canonical https URL, and we get ERR_TOO_MANY_REDIRECTS during SSO.
map $http_x_forwarded_proto $fwd_proto {
    default $scheme;
    ~.+     $http_x_forwarded_proto;
}

server {
    # Rootless podman can't bind privileged ports inside the container.
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    # Element's static files, copied into the image at /app.
    root /app;
    index index.html;

    # Matrix client-server + federation + synapse admin paths all start with
    # these prefixes. Proxy them to the homeserver. We set X-Forwarded-* so
    # Synapse's `x_forwarded: true` listener trusts our original scheme/host.
    location ~ ^(/_matrix|/_synapse/client|/_synapse/admin|/.well-known/matrix) {
        proxy_pass http://homeserver:8008;
        # Preserve the original Host header including port ($http_host) so
        # Synapse's canonical-URL check sees chat.domain:8443, not the bare
        # hostname from nginx's $host variable.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        # Synapse media + long-polling needs a generous timeout and body size.
        client_max_body_size 50M;
        proxy_read_timeout 300s;
    }

    # Element SPA — try the requested URI, then index.html for client-side
    # routing.
    location / {
        try_files $uri $uri/ /index.html;
        # Element wants these headers to opt into correct PWA behaviour.
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
    }
}
