[service]
name = "uptime-kuma"
description = "Uptime Kuma - self-hosted monitoring tool"
url = "https://github.com/louislam/uptime-kuma"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 128
recommended = 256

[[ports]]
name = "http"
container_port = 3001

[integrations]
auth = []
smtp = false
# Sqlite-backed (data/kuma.db). Stop, snapshot, start.
backup = true

[backup]
paths = ["data"]
