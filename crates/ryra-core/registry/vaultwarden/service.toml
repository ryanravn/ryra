[service]
name = "vaultwarden"
description = "Vaultwarden - lightweight Bitwarden-compatible server"
url = "https://github.com/dani-garcia/vaultwarden/wiki"
architecture = ["amd64", "arm64"]
https = "always"

[requirements.ram]
min = 128
recommended = 512

[[ports]]
name = "http"
container_port = 80

[[env]]
name = "DOMAIN"
value = "{{service.external_url}}"

[[env]]
name = "SIGNUPS_ALLOWED"
value = "true"

[[env]]
name = "WEBSOCKET_ENABLED"
value = "true"

# Enables the /admin management UI when set to a non-empty value. Optional —
# empty means no admin panel (default, safest). Users who want the admin UI
# can supply a token interactively or via `env = { ADMIN_TOKEN = "…" }`
# on `ryra add`.
[[env]]
name = "ADMIN_TOKEN"
value = ""
kind = "prompted"
prompt = "Admin token for /admin panel (leave empty to disable)"

[integrations]
auth = []
smtp = true

[mappings.smtp]
SMTP_HOST = "{{smtp.host}}"
SMTP_PORT = "{{smtp.port}}"
SMTP_USERNAME = "{{smtp.username}}"
SMTP_PASSWORD = "{{smtp.password}}"
SMTP_FROM = "{{smtp.from}}"
SMTP_SECURITY = "{{smtp.security}}"

# Tests are in tests/vaultwarden.toml (lifecycle test with SMTP setup)
