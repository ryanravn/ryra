# End-to-end test of the encrypted backup feature against a local
# MinIO acting as the S3 backend. Boots a fresh VM, installs MinIO,
# wires `ryra backup` to it with MinIO's root credentials, installs
# vikunja with `--backup` so it ends up in the backup rotation,
# plants a sentinel file in vikunja's data dir, runs a backup,
# mutates the sentinel, runs the restore, and asserts the sentinel
# came back.
#
# Why vikunja: it's a real stateful service with sqlite + uploaded
# files, and its backup hooks stop/start the systemd unit around the
# snapshot. That exercises the full hook flow, not just `restic` in
# isolation (which is already covered by the local-backend
# integration test in crates/ryra-core/tests/backup_e2e.rs).
[test]
name = "backup-minio-lifecycle"
ram = 2048

# 0. Ensure restic is on PATH. Newly-prepared images install it via
#    cloud-init (see Distro::cloud_init_packages), but cached images
#    from before that change won't have it — and there's no cache
#    versioning yet to force a rebuild. The fallback `dnf install`
#    is a no-op when restic is already present.
[[steps]]
action = "shell"
name = "ensure-restic"
run = """set -euo pipefail
if ! command -v restic >/dev/null; then
    if command -v dnf >/dev/null; then
        sudo dnf install -y restic
    elif command -v apt-get >/dev/null; then
        sudo apt-get update -qq && sudo apt-get install -y restic
    else
        echo "no recognised package manager and restic is missing" >&2
        exit 1
    fi
fi
restic version
"""
timeout = 180

# 1. Install MinIO — the S3 backend.
[[steps]]
action = "add"
service = "minio"
timeout = 300

[[steps]]
action = "wait"
service = "minio"
timeout = 180

# Verify MinIO is alive before we point restic at it.
[[steps]]
action = "http"
name = "minio-health"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP/minio/health/live"
service = "minio"
poll = { interval = 2, attempts = 60 }
timeout = 180

# 2. Configure `ryra backup` against MinIO. Reads MinIO's root
#    credentials out of its own `.env`. `restic init` (run by
#    configure) creates the bucket if it doesn't exist — MinIO's
#    root user has the permission to do that.
[[steps]]
action = "shell"
name = "configure-backup"
run = """set -euo pipefail
MINIO_ENV=$HOME/.local/share/services/minio/.env
ROOT_USER=$(grep '^MINIO_ROOT_USER=' $MINIO_ENV | cut -d= -f2-)
ROOT_PWD=$(grep '^MINIO_ROOT_PASSWORD=' $MINIO_ENV | cut -d= -f2-)
PORT=$(grep '^SERVICE_PORT_HTTP=' $MINIO_ENV | cut -d= -f2-)
ryra backup configure \\
    --backend=s3 \\
    --endpoint=http://127.0.0.1:$PORT \\
    --bucket=ryra-backups \\
    --access-key-id=$ROOT_USER \\
    --secret-access-key=$ROOT_PWD \\
    --password=test-encryption-key-abcdef0123456789 \\
    --yes
ryra backup status
"""
timeout = 120

# 3. Install vikunja with `--backup` so it lands in the rotation.
[[steps]]
action = "add"
service = "vikunja"
args = "--backup"
timeout = 300

[[steps]]
action = "wait"
service = "vikunja"
timeout = 180

# 4. Plant a sentinel file in vikunja's user-data directory. Anything
#    under files/ counts as data per the classifier, so restic will
#    include it in the snapshot.
[[steps]]
action = "shell"
name = "plant-sentinel"
run = """set -euo pipefail
FILES=$HOME/.local/share/services/vikunja/files
test -d $FILES
echo "original-content" > $FILES/sentinel.txt
test "$(cat $FILES/sentinel.txt)" = "original-content"
"""
timeout = 30

# 5. Run the backup. Hooks stop vikunja, restic pushes a snapshot,
#    hooks start vikunja again.
[[steps]]
action = "shell"
name = "backup-run"
run = "ryra backup run vikunja"
timeout = 300

# Vikunja restarts inside the post_backup hook — wait for the unit
# to be active again before mutating, so we don't race a half-up
# service against the subsequent steps.
[[steps]]
action = "wait"
service = "vikunja"
timeout = 180

# 6. Verify the snapshot landed in the MinIO bucket. `ryra backup
#    list` shells out to `restic snapshots --tag service:vikunja`,
#    which exits zero with at least one row when a snapshot exists.
[[steps]]
action = "shell"
name = "list-shows-snapshot"
run = """set -euo pipefail
OUTPUT=$(ryra backup list vikunja 2>&1)
echo "$OUTPUT"
echo "$OUTPUT" | grep -q 'service:vikunja' || {
    echo "expected at least one snapshot tagged service:vikunja in: $OUTPUT"
    exit 1
}
"""
timeout = 60

# 7. Mutate the sentinel and confirm the change is live.
[[steps]]
action = "shell"
name = "mutate-sentinel"
run = """set -euo pipefail
FILES=$HOME/.local/share/services/vikunja/files
echo "mutated-content" > $FILES/sentinel.txt
test "$(cat $FILES/sentinel.txt)" = "mutated-content"
"""
timeout = 30

# 8. Restore from the latest snapshot. Hooks stop vikunja, wipe the
#    data dirs, restic restores, hooks start vikunja again.
[[steps]]
action = "shell"
name = "backup-restore"
run = "ryra backup restore vikunja"
timeout = 300

[[steps]]
action = "wait"
service = "vikunja"
timeout = 180

# 9. Sentinel must be back to its original content. If this assertion
#    fails, the round-trip didn't work.
[[steps]]
action = "shell"
name = "verify-restored"
run = """set -euo pipefail
FILES=$HOME/.local/share/services/vikunja/files
ACTUAL=$(cat $FILES/sentinel.txt)
test "$ACTUAL" = "original-content" || {
    echo "Expected 'original-content', got '$ACTUAL'"
    exit 1
}
"""
timeout = 30
