# `ryra configure <svc> --auth` / `--no-auth` lifecycle test. Vikunja is
# installed *without* `--auth`, then OIDC is turned on via configure,
# then off again. Each transition has to round-trip authelia's
# `configuration.yml` (register / unregister an OIDC client block) and
# vikunja's `.env` (add / strip OIDC env vars).

[test]
name = "configure-auth"
ram = 5632

# Install caddy + authelia first so vikunja's URL has a reverse proxy
# and there's an OIDC provider to register against.
[[steps]]
action = "add"
service = "caddy"

[[steps]]
action = "wait"
service = "caddy"

[[steps]]
action = "add"
service = "authelia"
args = "--url https://auth.internal:8443"
env = { AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300

[[steps]]
action = "wait"
service = "authelia"

# Install vikunja with a URL but no auth.
[[steps]]
action = "add"
service = "vikunja"
args = "--url https://vikunja.internal:8443"
timeout = 300

[[steps]]
action = "wait"
service = "vikunja"

# Sanity: authelia's configuration.yml must NOT mention vikunja yet,
# and vikunja's .env must NOT carry OIDC env vars.
[[steps]]
action = "shell"
name = "auth-off-baseline"
run = """set -e
AUTH_YAML=~/.local/share/services/authelia/config/configuration.yml
VIK_ENV=~/.local/share/services/vikunja/.env
! grep -q "client_name: 'vikunja'" "$AUTH_YAML"
! grep -q '^VIKUNJA_AUTH_OPENID_PROVIDERS' "$VIK_ENV"
! grep -q '^auth =' ~/.local/share/services/vikunja/metadata.toml
"""
timeout = 30

# Turn auth ON. This must:
#  - inject a `client_name: 'vikunja'` block into authelia's yaml
#  - restart authelia
#  - add OIDC env vars to vikunja's .env
#  - record `auth = "oidc"` in vikunja's metadata
#  - restart vikunja
[[steps]]
action = "shell"
name = "configure-auth-on"
run = """set -e
ryra configure vikunja --auth -y
AUTH_YAML=~/.local/share/services/authelia/config/configuration.yml
VIK_ENV=~/.local/share/services/vikunja/.env
grep -q "client_name: 'vikunja'" "$AUTH_YAML"
grep -q '^VIKUNJA_AUTH_OPENID_PROVIDERS' "$VIK_ENV" \
    || grep -q '^VIKUNJA_AUTH_OPENID_ENABLED' "$VIK_ENV"
grep -q '^auth = ' ~/.local/share/services/vikunja/metadata.toml
"""
timeout = 180

[[steps]]
action = "wait"
service = "vikunja"

# Turn auth OFF. This must:
#  - strip the `client_name: 'vikunja'` block from authelia's yaml
#  - restart authelia
#  - drop OIDC env vars from vikunja's .env
#  - clear `auth =` from vikunja's metadata
#  - restart vikunja
[[steps]]
action = "shell"
name = "configure-auth-off"
run = """set -e
ryra configure vikunja --no-auth -y
AUTH_YAML=~/.local/share/services/authelia/config/configuration.yml
VIK_ENV=~/.local/share/services/vikunja/.env
! grep -q "client_name: 'vikunja'" "$AUTH_YAML"
! grep -q '^VIKUNJA_AUTH_OPENID_PROVIDERS' "$VIK_ENV"
! grep -q '^auth = ' ~/.local/share/services/vikunja/metadata.toml
"""
timeout = 180

[[steps]]
action = "wait"
service = "vikunja"
