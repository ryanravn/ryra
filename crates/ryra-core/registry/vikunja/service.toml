[service]
name = "vikunja"
description = "Vikunja - task management with lists, kanban boards, and calendars"
url = "https://vikunja.io/docs/"
architecture = ["amd64", "arm64"]
https = "auth"

[requirements.ram]
min = 128
recommended = 256

[[ports]]
name = "http"
container_port = 3456

# --- Vikunja config ---

[[env]]
name = "VIKUNJA_SERVICE_PUBLICURL"
value = "{{service.external_url}}"

[[env]]
name = "VIKUNJA_SERVICE_JWTSECRET"
value = "{{secret.jwt_secret}}"

# Optional Todoist import. Enabling this surfaces the "Todoist" tile
# under Settings -> Import from other services in the Vikunja UI. The
# user must register an OAuth app at
# https://developer.todoist.com/appconsole.html; Vikunja derives the
# redirect URL from VIKUNJA_SERVICE_PUBLICURL as
# <publicurl>/migrate/todoist. Todoist requires HTTPS for OAuth, so
# this is only useful when Vikunja is reachable via a real https URL.
[[env_group]]
name = "todoist"
prompt = "Enable Todoist import? (requires an OAuth app at developer.todoist.com)"

  [[env_group.env]]
  name = "VIKUNJA_MIGRATION_TODOIST_ENABLE"
  value = "true"

  [[env_group.env]]
  name = "VIKUNJA_MIGRATION_TODOIST_CLIENTID"
  value = ""
  kind = "required"
  prompt = "Todoist OAuth client ID"

  [[env_group.env]]
  name = "VIKUNJA_MIGRATION_TODOIST_CLIENTSECRET"
  value = ""
  kind = "required"
  prompt = "Todoist OAuth client secret"

[integrations]
auth = ["oidc"]
oidc_callbacks = ["/auth/openid/authelia"]
smtp = true

[mappings.auth]
VIKUNJA_AUTH_OPENID_ENABLED = "true"
VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_NAME = "SSO"
VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_AUTHURL = "{{auth.external_url}}"
VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_CLIENTID = "{{auth.client_id}}"
VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_CLIENTSECRET = "{{auth.client_secret}}"

[mappings.smtp]
VIKUNJA_MAILER_ENABLED = "true"
VIKUNJA_MAILER_HOST = "{{smtp.host}}"
VIKUNJA_MAILER_PORT = "{{smtp.port}}"
VIKUNJA_MAILER_USERNAME = "{{smtp.username}}"
VIKUNJA_MAILER_PASSWORD = "{{smtp.password}}"
VIKUNJA_MAILER_FROMEMAIL = "{{smtp.from}}"
