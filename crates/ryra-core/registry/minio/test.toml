# MinIO tests — install assertion + health probe.
# The integration with `ryra backup` is exercised by the `backup-minio`
# lifecycle test in registry/tests/.

[[tests]]
name = "minio"
[[tests.steps]]
action = "add"
service = "minio"
[[tests.steps]]
action = "wait"
service = "minio"
[[tests.steps]]
action = "http"
name = "health-live"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP/minio/health/live"
service = "minio"
poll = { interval = 2, attempts = 30 }
timeout = 90
[[tests.steps]]
action = "shell"
name = "data-dir-created"
run = "test -d $HOME/.local/share/services/minio/data"
