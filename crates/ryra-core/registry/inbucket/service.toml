[service]
name = "inbucket"
description = "Inbucket - disposable email testing server with web UI"
url = "https://inbucket.org/"
kind = "infrastructure"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 64
recommended = 128

[[ports]]
name = "http"
container_port = 9000

[[ports]]
name = "smtp"
container_port = 2500

[integrations]
auth = []
smtp = false

[capabilities]
provides = ["smtp-relay"]
