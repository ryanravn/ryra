# nextcloud tests - plain install, SMTP via inbucket, OIDC via authelia.
#
# Test names:
#   - `nextcloud`       (plain install + HTTP probe + occ status check)
#   - `nextcloud-smtp`  (outbound mail via inbucket, triggered by occ mail:test)
#   - `nextcloud-oidc`  (user_oidc app + authelia provider registered via occ)

# Plain install. Nextcloud first-boot is slow: DB migrations + app
# scaffolding can take 2-3 minutes on the test VM, hence the generous
# timeouts and poll counts below.
[[tests]]
name = "nextcloud"
[[tests.steps]]
action = "add"
service = "nextcloud"
timeout = 900
[[tests.steps]]
action = "wait"
service = "nextcloud"
[[tests.steps]]
action = "http"
name = "nextcloud-responds"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP/status.php"
service = "nextcloud"
poll = { interval = 3, attempts = 80 }
timeout = 360
[[tests.steps]]
action = "shell"
name = "installed-reports-healthy"
run = """for i in $(seq 1 80); do
  podman exec -u www-data nextcloud php occ status --output=json 2>/dev/null | grep -q '"installed":true' && exit 0
  sleep 5
done
echo "Nextcloud never reported installed=true"
podman logs --tail 50 nextcloud 2>&1 || true
exit 1"""
timeout = 420
[[tests.steps]]
action = "shell"
name = "data-dir-accessible"
run = "test -d $HOME/.local/share/services/nextcloud/data"

# SMTP test - create a user with an email address, then fire `occ mail:test`
# at them. Nextcloud routes that through the configured SMTP (inbucket)
# and we poll inbucket for delivery.
[[tests]]
name = "smtp"
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "nextcloud"
args = "--smtp=inbucket"
timeout = 900
[[tests.steps]]
action = "wait"
service = "nextcloud"
[[tests.steps]]
action = "http"
name = "nextcloud-responds"
url = "http://127.0.0.1:$SERVICE_PORT_HTTP/status.php"
service = "nextcloud"
poll = { interval = 3, attempts = 80 }
timeout = 360
[[tests.steps]]
action = "shell"
name = "wait-for-install-complete"
run = """for i in $(seq 1 80); do
  podman exec -u www-data nextcloud php occ status --output=json 2>/dev/null | grep -q '"installed":true' && exit 0
  sleep 5
done
exit 1"""
timeout = 420
[[tests.steps]]
action = "shell"
name = "create-mail-target-user"
run = """podman exec -e OC_PASS='Testing-Smtp-123!' -u www-data nextcloud \
  php occ user:add --password-from-env --display-name='SMTP Test' smtptest
podman exec -u www-data nextcloud \
  php occ user:setting smtptest settings email 'smtptest@example.com'"""
timeout = 60
# `configure-smtp.sh` runs as ExecStartPost, in parallel with the test.
# `occ status` reporting installed:true does not mean the script has
# finished its `occ config:system:set mail_smtphost ...` calls. Under
# load (running the full E2E suite back-to-back), `user:welcome` can
# fire before SMTP is wired; it silently exits 0, no mail ever reaches
# inbucket, and `mail-delivered-to-inbucket` burns its retry budget.
#
# Block here until configure-smtp.sh prints its end-of-script marker on
# the journal. journalctl polling is fast (~0.1s) so this fits in the
# timeout even on a busy host, unlike `podman exec ... occ ...` which
# adds 1-2s of overhead per attempt and bursts through the budget.
[[tests.steps]]
action = "shell"
name = "wait-for-smtp-configured"
run = """for i in $(seq 1 90); do
  journalctl --user -u nextcloud.service --no-pager 2>/dev/null \
    | grep -q 'Nextcloud SMTP configured' && exit 0
  sleep 2
done
echo "configure-smtp.sh never printed 'Nextcloud SMTP configured' marker"
echo "--- last 60 lines of nextcloud.service journal ---"
journalctl --user -u nextcloud.service --no-pager -n 60 2>&1 || true
exit 1"""
timeout = 200
# Fire the welcome 5 times with a gap. `occ user:welcome` exits 0 on
# the first call but the actual SMTP send is intermittently dropped on
# a busy host (delivery observed at 0.2s in some runs, never within
# 120s in others, even though the SMTP config and inbucket network
# are fully ready). Sending five times is well within nextcloud's
# rate limits and gives the mail step a near-deterministic landing.
[[tests.steps]]
action = "shell"
name = "trigger-smtp-mail"
run = """set -e
for i in 1 2 3 4 5; do
  podman exec -u www-data nextcloud php occ user:welcome smtptest 2>&1
  sleep 5
done"""
timeout = 90
[[tests.steps]]
action = "mail"
name = "mail-delivered-to-inbucket"
mailbox = "smtptest"
contains = "Your Nextcloud account was created"
poll = { interval = 2, attempts = 60 }
timeout = 150

# OIDC registration + full SSO click-through. caddy terminates TLS,
# authelia is the IdP. nextcloud gets user_oidc installed and the authelia
# provider registered via occ (shell assertions), then a Playwright spec
# actually clicks the SSO button and completes the login round-trip.
[[tests]]
name = "oidc"
browser = true
[[tests.steps]]
action = "add"
service = "caddy"
[[tests.steps]]
action = "wait"
service = "caddy"
[[tests.steps]]
action = "add"
service = "authelia"
args = "--url https://auth.internal:8443"
env = { AUTHELIA_ADMIN_USER = "testuser", AUTHELIA_ADMIN_PASSWORD = "testpassword123" }
timeout = 300
[[tests.steps]]
action = "wait"
service = "authelia"
[[tests.steps]]
action = "add"
service = "nextcloud"
args = "--auth --url https://nextcloud.internal:8443"
timeout = 900
[[tests.steps]]
action = "wait"
service = "nextcloud"
[[tests.steps]]
action = "http"
name = "nextcloud-via-caddy"
url = "https://nextcloud.internal:8443/status.php"
poll = { interval = 5, attempts = 80 }
timeout = 480
[[tests.steps]]
action = "shell"
name = "user-oidc-installed"
run = """for i in $(seq 1 80); do
  podman exec -u www-data nextcloud php occ app:list 2>/dev/null | grep -q 'user_oidc' && exit 0
  sleep 5
done
echo "user_oidc app never appeared"
podman exec -u www-data nextcloud php occ app:list 2>&1 | head -40 || true
exit 1"""
timeout = 420
[[tests.steps]]
action = "shell"
name = "oidc-provider-registered"
run = """for i in $(seq 1 30); do
  podman exec -u www-data nextcloud php occ user_oidc:provider 2>/dev/null | grep -qi 'authelia' && exit 0
  sleep 5
done
echo "authelia provider never registered"
podman exec -u www-data nextcloud php occ user_oidc:provider 2>&1 || true
exit 1"""
timeout = 180
[[tests.steps]]
action = "playwright"
name = "playwright-sso-flow"
spec = "nextcloud-auth.spec.ts"
timeout = 180
env = { AUTHELIA_USER = "testuser", AUTHELIA_PASSWORD = "testpassword123" }
