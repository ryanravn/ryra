[service]
name = "docuseal"
description = "DocuSeal — open-source document signing (DocuSign alternative)"
url = "https://www.docuseal.com/"
architecture = ["amd64", "arm64"]

[requirements.ram]
min = 256
recommended = 512

[[ports]]
name = "http"
container_port = 3000

[[env]]
name = "HOST"
value = "{{ service.external_url }}"

[[env]]
name = "SECRET_KEY_BASE"
value = "{{secret.secret_key_base}}"

[[env]]
name = "FORCE_SSL"
value = "false"

[integrations]
auth = []
smtp = true

[mappings.smtp]
# DocuSeal uses standard Rails ActionMailer SMTP env vars.
SMTP_ADDRESS = "{{smtp.host}}"
SMTP_PORT = "{{smtp.port}}"
SMTP_USERNAME = "{{smtp.username}}"
SMTP_PASSWORD = "{{smtp.password}}"
SMTP_FROM = "{{smtp.from}}"
