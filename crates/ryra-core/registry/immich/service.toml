[service]
name = "immich"
description = "Immich - self-hosted photo & video management"
url = "https://immich.app/"
architecture = ["amd64", "arm64"]
https = "auth"

[requirements.ram]
min = 1024
# Immich bundles a photo server, postgres, valkey, and a Python ML model
# loader. At boot, the main immich process alone RSSes ~2.2GB; add
# postgres shared_buffers + workers + ML model + kernel/page-cache
# headroom and the VM gets OOM-killed under ~6GB. Test VMs are sized
# off `recommended + 512MB` so aim for plenty of headroom here.
recommended = 6144

[[ports]]
name = "http"
container_port = 2283

# --- Environment variables ---

[[env]]
name = "DB_PASSWORD"
value = "{{secret.db_password}}"

[[env]]
name = "DB_USERNAME"
value = "postgres"

[[env]]
name = "DB_DATABASE_NAME"
value = "immich"

[[env]]
name = "DB_HOSTNAME"
value = "postgres"

[[env]]
name = "REDIS_HOSTNAME"
value = "valkey"

[[env]]
name = "IMMICH_MACHINE_LEARNING_URL"
value = "http://machine-learning:3003"

[[env]]
name = "INIT_IMMICH_ADMIN_EMAIL"
value = "{{admin.email | default('admin@example.com')}}"
kind = "prompted"
prompt = "Admin email"

[[env]]
name = "INIT_IMMICH_ADMIN_PASSWORD"
value = "{{secret.admin_password}}"
kind = "prompted"
prompt = "Admin password"

# --- Auth integration ---
# Immich configures OIDC via its admin API (PUT /system-config), not env vars.
# Config scripts in configs/ handle admin user creation and OIDC setup.

[integrations]
auth = ["oidc"]
oidc_callbacks = ["/auth/login"]
smtp = false

[mappings.auth]
OAUTH_CLIENT_ID = "{{auth.client_id}}"
OAUTH_CLIENT_SECRET = "{{auth.client_secret}}"
OAUTH_ISSUER_URL = "{{auth.issuer}}"
OAUTH_REDIRECT_URL = "{{service.external_url}}/auth/login"
OAUTHLIB_INSECURE_TRANSPORT = "1"
NODE_TLS_REJECT_UNAUTHORIZED = "0"
