[service]
name = "seafile"
description = "Seafile - file sync and share server"
url = "https://www.seafile.com/"
architecture = ["amd64", "arm64"]
https = "always"

[requirements.ram]
min = 1024
recommended = 2048

[[ports]]
name = "http"
container_port = 80

# --- MariaDB env vars ---

[[env]]
name = "MYSQL_ROOT_PASSWORD"
value = "{{secret.mysql_root_password}}"

[[env]]
name = "MYSQL_LOG_CONSOLE"
value = "true"

# --- Seafile database connection ---
# Seafile 13.x reads SEAFILE_MYSQL_DB_HOST and INIT_SEAFILE_MYSQL_ROOT_PASSWORD
# in wait_for_mysql() (utils.py) and bootstrap.py. Older tutorials referenced
# DB_HOST/DB_ROOT_PASSWD, but those are ignored by the 13.x image and cause
# the container to poll `db:3306` forever.

[[env]]
name = "SEAFILE_MYSQL_DB_HOST"
value = "mariadb"

# Required by seafdav's seahub_db init (thirdpart/wsgidav/dc/seahub_db.py).
# Without this, `os.environ.get('SEAFILE_MYSQL_DB_PORT')` returns None, the
# in-code default never kicks in (`int(None)` raises before the second
# `.get` default), the seahub session fails to initialize, and every
# WebDAV request authenticated via `ENABLE_WEBDAV_SECRET` short-circuits
# to 401 — silently, with no useful error in seafdav.log beyond a one-time
# "Failed to init seahub db" warning at startup. Static value because the
# in-container mariadb always listens on 3306 (the host port doesn't matter
# to seafile — it talks to mariadb over the podman network).
[[env]]
name = "SEAFILE_MYSQL_DB_PORT"
value = "3306"

[[env]]
name = "INIT_SEAFILE_MYSQL_ROOT_PASSWORD"
value = "{{secret.mysql_root_password}}"

# seaf-server (the C binary) reads SEAFILE_MYSQL_DB_USER/PASSWORD from the
# environment directly — they are not stored in any config file. Both setup
# (bootstrap.py creates the user) and runtime (seaf-server authenticates) read
# these, so they must be persistent across restarts.
[[env]]
name = "SEAFILE_MYSQL_DB_USER"
value = "seafile"

[[env]]
name = "SEAFILE_MYSQL_DB_PASSWORD"
value = "{{secret.mysql_seafile_password}}"

[[env]]
name = "SEAFILE_MYSQL_DB_CCNET_DB_NAME"
value = "ccnet_db"

[[env]]
name = "SEAFILE_MYSQL_DB_SEAFILE_DB_NAME"
value = "seafile_db"

[[env]]
name = "SEAFILE_MYSQL_DB_SEAHUB_DB_NAME"
value = "seahub_db"

# --- Seafile server config ---

[[env]]
# Seafile builds frontend asset URLs by concatenating SCHEME + HOSTNAME
# + path. Hardcoding `:service.port` emits `https://<host>:10001/media/…`,
# but the local container publish port isn't reachable from the tailnet
# or Caddy — the public route terminates on :443 (or caddy_https_port).
# Use external_authority so the port is included only when the URL has
# an explicit one; fall back to 127.0.0.1:<port> for the no-URL case.
name = "SEAFILE_SERVER_HOSTNAME"
value = "{{service.external_authority | default('127.0.0.1:' ~ service.port)}}"

[[env]]
name = "SEAFILE_SERVER_PROTOCOL"
value = "{{service.scheme}}"

[[env]]
name = "JWT_PRIVATE_KEY"
value = "{{secret.jwt_key}}"
format = "hex"
length = 32

[[env]]
name = "INIT_SEAFILE_ADMIN_EMAIL"
value = "{{admin.email | default('admin@example.com')}}"
kind = "prompted"
prompt = "Admin email"

[[env]]
name = "INIT_SEAFILE_ADMIN_PASSWORD"
value = "{{secret.admin_password}}"
kind = "prompted"
prompt = "Admin password"

# --- Redis cache ---

[[env]]
name = "CACHE_PROVIDER"
value = "redis"

# --- Auth integration ---
# Seafile reads OAuth config from seahub_settings.py (a Python file), not env
# vars. The auth mappings below write OAUTH_* vars into the .env file.
# Config scripts in configs/ handle OAuth injection into seahub_settings.py.

[integrations]
auth = ["oidc"]
token_auth_method = "client_secret_basic"
oidc_callbacks = ["/oauth/callback/"]
smtp = true
# File-level snapshot of mariadb datadir (db-data/) + the shared
# file storage (shared/, holds user file blobs + seafile config +
# logs). Redis is regenerable cache and excluded. Mariadb is
# stopped during the backup so InnoDB tablespaces are at a
# consistent on-disk point, same as the supabase pattern.
backup = true

[backup]
paths = ["db-data", "shared"]

[mappings.smtp]
SMTP_HOST = "{{smtp.host}}"
SMTP_PORT = "{{smtp.port}}"
SMTP_USERNAME = "{{smtp.username}}"
SMTP_PASSWORD = "{{smtp.password}}"
SMTP_FROM = "{{smtp.from}}"
SMTP_SECURITY = "{{smtp.security}}"

[mappings.auth]
OAUTH_CLIENT_ID = "{{auth.client_id}}"
OAUTH_CLIENT_SECRET = "{{auth.client_secret}}"
OAUTH_REDIRECT_URL = "{{service.external_url}}/oauth/callback/"
OAUTH_PROVIDER_DOMAIN = "{{auth.external_url}}"
OAUTH_INTERNAL_DOMAIN = "{{auth.external_url}}"
