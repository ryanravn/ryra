[workspace]
members = ["crates/ryra-core", "crates/ryra-cli", "crates/ryra-vm", "crates/ryra-test", "crates/ryra-dev-tools"]
resolver = "3"
default-members = ["crates/ryra-cli"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process"] }
thiserror = "2"
anyhow = "1"
